front:
  text: 淨明忠孝全書卷之二
  hash: sha256:b1aa928b949978751341063c55bee6252003d2a6001931a2699aebfdbd7091dc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5e0012_HFL_002-001a, image: hfl/0757/0757-082.png}
body:
  text: 淨明傳教法師黃元吉編集嗣派弟子徐慧校正玉真靈寶壇記許遜撰鍾陵之靈鍾大寶於西山厥維西山萃古今精氣實上下神仙一大區宅有道之士率由是出自吾得太上淨明吾與張洪崖胡拔俗等其人也龍沙有讖松沙有記一皆為是西山中靈寶祕前鸞翔後鶴峙奠烏晶紹仙裔斯靈伊何太素始名太極判精靈寶現形故此一寶靈也在天為黃中在地為烏晶在人為丹扃惟寶斯靈弗寶弗靈有道之士克寶斯靈者自有重重樓閣內景黃庭三五飛步神奏玉京符千年之嘉運備八百之仙數騎鶴玉府烹鳳瑶池其視塵世寶珠直天地間一瓦礫耳吾有弟子玉真子受吾記囑來尋舊迹克寶斯靈克靈厥晶八百群真一曰玉真二曰隱真三曰洞真靈真寶真一真萬真真真聚神金烏誕靈靈寶聚精玉兔誕形天降斯道地升斯寶珍之作之天地為一率是群真克紹吾勳有道之士無纍俗紛式克輔之斬蛇馘鯨窮曰宇宙功超玉清顧不偉歟乃繫之以銘日金烏流晶洪井肖形鍾陵聚靈龍沙首英八百八百靈寶斯獲玉真隱德爰立厥宅淨明大道說胡化俗述淨明者無形大道先天之宗本也在上為無上清虛在天為中黃八極在人為丹元絳宫此三者同出而異名同謂之玄玄之又玄衆妙之門明此理者淨明也清則淨虛而明無上清虛之境謂之淨明中黃八極天心也丹元絳宫人心也故天立中黃八極而報無上之本人當忠孝而答君親之恩忠孝大道之本也是以君子務本本立而道生孝弟也者其為仁之本與有不務本而修鍊者若太匠無材縱巧何成惟有大舜比干不修鍊力忠孝不求道道自備下則豺狼有父子螻蟻有君臣物且尚能忠孝況於人乎況於法子乎淨明大道同理同源不同形同理者誰能出不由户何莫由斯道也同源不同形者是道生一生二二生三三生萬物萬物之中中惟人最貴不忠不孝不如豺狼螻蟻乎不能淨明者不如蜣蜋飲露乎物得忠孝大道體法子夫豈不知吾奉太上設忠孝大道之門甚易知甚易行勉而宏之人能弘道非道弘人要不在參禪問道入山鍊形貴在乎忠孝立本方寸淨明四美俱備神漸通靈不用修鍊自然道成信斯言也直至淨明淨明道法說胡化俗迷無極無形大道道生一一生兩儀兩儀生四象四象生八卦曰中黃八極九宫也道立其中黃法布於八極一隂一陽一動一靜相為表裏者也正道在於內布法治其外一正八治天清地寧釋曰無極清虛曰淨明道在其中曰中黃法布八方為八極會四象朝三天曰三五飛步正其內治其外曰正一斬邪法子欲治其外先正其內欲正其內先去其欲無欲而心自正一正心而道法備矣淨明法說郭璞述無極而太極無極者淨明之謂也經云無名天地之始有名萬物之母故自太極判兩儀立人斯生而人於天地間為最秀此所以並天地曰三才然後天地以好生為心則人體天地心為心先天之世人心與天地一清靜而無為中天以來無者不能不顯於有而淨明之教猶未甚泯也後天之後有為者葛殊千致與夫無名天地之始者異矣太上推好生之德憫人生之不齊不得不彰其法則垂慈立教夫法者律也律不善以歸於善律不仁以歸於仁律不忠不孝而歸於忠孝淨明者太上授之於日月二君二君授之於許太史許太史復宣布而流傳之凡吾法子行積莫大方遇至教其當守律勿失仰之如神明畏之如雷霆奉而行之回後天而先天復有名而無名殆猶日月晦而明天地夜而旦四時冬而春道在其中淨明之教周流八荒雖許太史道尊德貴功蓋九州而吾法子功成行滿洞隱玉真備符淨明無為一也玉真立壇疏郭璞撰天靈地寶成大道藏玉真其生也無名其出也有數今就黃堂山立壇奉道祝國壽報親恩如是道在其中矣師仙君立記銘豫具疏而成之疏曰龍沙讖仙八百始自玉真烏晶麗景三千中藏靈寶將周氣運用立壇場須教白水真人大家從更便看黃山處士特地功成籍桂名香即日均書玉府蟠桃性熟他時共宴瓊宫淨明忠孝全書卷之二
