front:
  text: 淨明忠孝全書卷之三奉六
  hash: sha256:2c329c8986c746f9bb44250fd019a6fab55b1669ff139016f71598a0c350b0e4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5e0012_HFL_003-001a, image: hfl/0757/0757-092.png}
body:
  text: 淨明傳教法師黄元吉編集嗣派弟子徐慧校正玉真先生語錄內集或問古今之法門多矣何以此教獨名淨明忠孝先生曰别無他說淨明只是正心誠意忠孝只是扶植綱常但世儒習聞此語爛熟了多是忽略過去此間却務真踐實履先生曰大忠者一物不欺大孝者一體皆愛先生曰何謂淨不染物何謂明不觸物不染不觸忠孝自得又曰忠者忠於君也心君爲萬神之主宰一念欺心即不忠也先生曰人子事其親自謂能竭其力者未也須是一念之孝能致父母心中印可則天心亦印可矣如此方可謂之孝道格天或問曰去古日遠文籍浩繁末學之夫莫知正略今淨明教中正心修身之學真忠至孝之道緊要處乞示一二語先生曰某自初年修學以來只是履踐三十字年來受用甚覺得力今以奉告所謂三十字者懲忿窒慾明理不昧心天纖毫失度即招黑暗之愆霎頃邪言必犯禁空之醜曰敢問其詳先生曰人之一性本自光明上與天通但苦多生以來漸染薰習縱忿恣欲曲昧道理便不得爲人之道則何以配天地而曰三才所謂忿者不只是恚怒嗔恨但涉嫉妬小狹褊淺不能容物以察察爲明一些箇放不過之類緫屬忿也若能深懲痛戒開廣襟量則嗔火自然不上炎所謂欲者不但是婬邪色欲但涉溺愛眷戀滯著事物之間如心貪一物綢繆意根不肯放舍緫屬欲也若能窒塞其源源即是愛念初萌處惺惺做人則欲水自然不下流雖是如此其中却要明理明理只是不昧心天心中有天者理即是也謂如人能敬愛父母便是不昧此道理不忘來處知有本源若頂天立地戴髮舍齒做箇人自幼至長不知愛敬順事其父母者非病風喪心而何乃至不知有君不知有師兄弟不能友恭交遊不尚信義等皆然此外但是固護己私不顧道理而行事者皆謂之昧心天心天纔昧恰如一面明鏡無端却把許多埃墨塗污其上凡此等累積一生㝠㝠罔覺自己本命元神蒙在黑暗之鄉所以一瞑目後便墮幽關長夜受苦萬狀卒乍未有出期哀哉靜觀世人有縱忿者焚和自傷有縱欲者沉墜己靈曲昧道理者元神日衰福德日銷只是他自不覺若能翻然醒覺截日改過者懲忿則心火下降窒欲則腎水上升明理不昧心天則元神日壯福德日增水上火下精神旣濟中有真土爲之主宰真土者即是明黄中之理只此便是正心修身之學真忠至孝之道修持乆乆復其本淨元明之性道在是矣後二十字乃王屋山石鼓天戒即是此間日用中宻行工夫且如行事但是一毫一髮不合法度處自己本命元神已是暗損却光明了日積月累不知改悔全體歸隂矣又談話間須是語覺無傷方出口但有一言半句不合道理的又有一種人愛說薄福話的恣意說出來無所忌憚不知虚空却有神明聽著所謂禁空之醜者即度人經中飛天大醜魔王是也其類甚衆上帝委任助佐三官檢察過惡常時飛行虚空鑒觀下界邪言一出冒犯其禁此只是天高聽畢之言但人聞者往往以爲常談而忽之耳彼纔動念之頃言者福德自銷福德旣銷殃禍隨至如上皆是感召而然所以經云自業所招還自來受由是觀之凡人一言一行可不謹哉而况有志於道之十乎先生曰大凡世人被些子嗔火欲水及與私意潜伏在肚皮裏不能降制者是阻隔了前程萬千好事可惜他不自覺若能降制得下者久久間真隂陽真五行之妙自當親見之道爲子得矣先生曰淨明大教大中至正之學也可以通行天下後世而無弊緊要處在不欺昧其心不斲喪其生謂之真忠至孝事先奉親公忠正直作世間上品好人旦旦尋思要仰不愧於天俯不愧於人内不怍於心當事會之難處處以明理之心處之似庖丁解牛底妙手處教十分當理著步步要上合天心只恁地做將去夙興夜寐存著忠孝一念在心者人不知天必知之也亦莫妄想希求福報日乆歲深自然如所願望要識得此教門不是蓬首垢面滯寂沈空的所爲所以古人道是不須求絶俗作名教罪人又道是欲修仙道先修人道每見世間一種號爲學道之士十二時中使心用計奸邪謬僻之不除險詖傾側之猶在任是滿口說出黄芽白雪黑汞紅鉛到底只成箇妄想去所以千人萬人學終無一二成究竟何以云然只是不曾先去整理心地故也古人云千虚不博一實要知求仙學道譬如做一座好房屋相似就地面上先要淨除瓦礫剪去荆榛深築磉窠方成基址次第建立柱石位置棟梁蓋覆齊全泥飾光凈工夫圓滿聳動觀瞻若是荆榛不除瓦礫不去不平基址不築磉窠却要就上面立柱架梁覆丸編壁莫教一日風雨震凌洪流漂蕩欹側傾倒枉費辛勤又如江流中做一座石橋相似先須推窮到底脚踏實地却就實地壘木疊石大做根脚砌到上頭平鋪橋面造屋遮覆方保不朽根基直得驚濤驟浪衝激無由怪雨顚風揺撼不動人人贊歎非有他也只是根深脚穩所以牢固長乆若心地不好根浮脚淺之士何可望其有成惟我都仙真君凈明道法忠孝雷霆心地上頓悟本淨元明性天中力行真忠至孝爲萬靈之主宰作後學之範模行己無虧用心切到功圓果滿德貴道尊拔宅飛騰萬年不朽俯視世間有諸不崇内行惟務外求者不可同日語矣何以故人心皆具天理終是未蒙相肯前輩有云待汝心正道汝是恁時方表無瑕疪細細思惟敦正孰邪孰真孰僞吾鞭不可妄得勉之勉之先生曰萬法皆空一誠爲實先生曰天立中黄八極而報無上之本正謂隔蔽中下界隂濁之氣不令上衝清虚之境人之一身亦有中黄八極亦是隔蔽下焦穢濁之氣不令薰蒸心府所謂膈膜者是也其世間不忠不孝怨怒諸氣上至天中黄八極其氣返而爲水旱疾疫之灾各從氣頻感召可以類推禍福無門唯人自召者此也惟有忠孝之氣徑衝清虚之境如矢中的至於惡曜亦爲之退舍先生曰奉行道法皆當平居暇日存守正念此即正心之學正則道在其中儻不正而用以驅邪則是助桀爲虐非徒無益而又害之先生曰世人積善屬陽陽氣上浮積惡屬隂隂氣下墮今天上星宿即世人陽氣也然三界有善有惡雖爲天星苟一念不正即屬隂隂氣自然復墮爲人星殞爲石者所墮之隂滓也或問從古學道求仙皆言修鍊二字今淨明教中於此獨略何耶先生曰吾但聞都仙真君有云淨明大教是正心修身之學非區區世俗所謂修鍊精氣之說也正心修身是教世人整理性天心地工夫若上古之世民生太朴未散何用整理何用修鍊語言動作無不合道只縁後世衆生多是詐詐姦姦愈趍愈下一動一作便昧其心㝠㝠罔覺無所不至間有慕道者不就本元心地上用克己工夫妄認修鍊精氣以爲無上真常之妙所以太上患斯道之不明也俯告日月帝君流通此教帝君復授之都仙真君必欲後之學者由真忠至孝復歸本淨元明之境修鍊之妙無以易此矣正是復古之學所以至胡天師復申言之曰貴在忠孝立本方寸凈明四美俱備神漸通靈不用修鍊自然道成信斯言也直至淨明要之都仙真君與胡天師此言不信何言可信世俗於克己工夫多是忽略别求修鍊方術殊不知不整心地只要飛騰可謂却行而求前者也今而斯道大明於世有識之士能趣此教可謂一日千里矣大槩有能忠孝立本方寸淨明者自己心天與上天黄中道氣血脉貫通此感彼應異時與道合真如水歸海矣可不勉旃先生曰天之有文地之有理人之有事三才之道古今不可誣也淨明之道不廢人事但當正心處物常應常靜也或問教中有云天立中黄八極而報無上之本八極正㨿穹霄何所願聞先生曰所謂報本而後還源是也無上是道中黄八極是理由道而生理明理以報本是教中大意都仙真君昔告我曰中天九宫之中黄中太一之景名曰天心又稱祖土乃世間生化之所由萬理之所都也其實只是混沌開闢之後積陽之氣上浮盤亘其廣八十一萬里是道理之主宰世人身心功過被此光明之所洞照纖芥圭黍所不能逃散在人身中謂之丹扃所以曰人心皆具太極一切善惡因果所不能逃如影隨形者蓋於上界實相關繫故也所以學道者必先窮理盡性以至於命明理之士自己心天光明洞徹自是不昧言行自然不犯於理絲毫礙理之事斷斷不肯爲只爲心明故也心明則知本性下落矣旣知本性復造命源當是時污習悉除隂滓普消升入無上清虚之境極道之墟水火風灾之所不及方得名爲超出隂陽易數生死之外今吾法子若不自躬行踐履上做起只講尋常修鍊精氣之術是謂不明理而學道却行而求前縱有小成亦不能升入清虚之境所以報盡復來散入諸趣可不懼哉蓋是黄中一關不曾過得俗語云於道理上過不去何以故未至天半諸魔不肯保舉故也所謂不肯保舉者只是此人平時念念愛作昧天理之事行義不足以服鬼神私心多公心少惡勝善隂勝陽終無大成氣象若以公忠正直仁孝亷明修學者則可與道合真上超種民之天無不成就者矣先生曰凡人家禍福鮮不由其平日操修所感召吾曾赴人家約爲供真是晚將及門遥望有黑覆其屋廬至則供具已辦吾告之曰天真不歆子之供矣其人驚問何故吾曰世間凶殃惡逆之氣上衝于天不能度中黄八極之境復下爲人之殃今子屋上有黑氣必因感召而至其人遂首陳早起家中有鬩墻之事吾曰是矣然横逆非乆當至縱爲勉强作供徒勞而已因命徹供具已而數日果有意外之禍所以曰和氣致祥乖氣致沴無非此感彼應吾又曾見方册中有一句云多用恕心無烈禍若萌姦巧有竒窮亦不外是理先生曰道藏經云修學真常之道玄功成就時身所行事是十聖智口所出言是太上㫖卷舒造化移易隂陽無施不可豈小事哉然則修學之事一舉足頃一出言間不合道理不合天心敢望至此地位乎先生曰道藏諸經無非教人捨惡歸善棄邪順正所以曰經者徑也是入道之徑路每見世人不肯力除惡習克去私己却於晨昏誦念不輟此等聖賢不取譬能言之猩猩也我諸法子要得此心如鏡之明如水之淨纖毫洞照日以改過崇行爲第一義積種種方便去道不遠矣勝如念千百卷經也若不務修德而求道前程難望有成所以曰德是道之基址道是德之華實靜心端坐試目思之先生曰吾初學淨明大道時不甚誦道經亦只是將舊記儒書在做工夫謂如崇德尚行每念到戒愼乎其所不賭恐懼乎其所不聞言悖而出者亦悖而入貨悖而入者亦悖而出此等言語發深信心不敢須臾違背了至於用心道妙每到人有雞犬放則知求之有放心而不知求及夜氣不足以存則其違禽獸不遠處便自然知耻一時感激不啻如湯火芒刺之在身心便思惟道是我若悠悠上去不了此道未免做先覺之罪人直是寢食不遑安處後來庶幾有進矣感格穹霄得些樂處靜而思之實由當時知耻之力也先生曰吾有三則古語學者可以佩受志節要高毋習卑污務圖近效器量要大毋局楄淺不能容物操履要正毋殉己私隨邪逐物先生曰世間粗心學道之人常說自己無有不是處豈有此理但是未嘗靜定思惟若將細細比較他古人成就者是爭多少階級所以某常說人不能自謙何可望其有進先生曰昔蘭公真君有云孝至於天日月爲之明孝至於地萬物爲之生孝至於民人道爲之成大哉孝乎世人但能以孝道二字常藴在方寸内則言必忠信行必篤敬忿亦漸消欲亦漸寡過亦能改善亦能遷人道備矣然後可以配天地曰三才若不能以孝道自牧者俗語謂之不做人又曰爲人不了或問正心之學審能行之足矣奚用道法爲哉先生曰此語中古之世則可行也若去古旣遠人心澆灕如魯論一書先聖所言多未曾行獨以子不語神藉口其流弊至於無所忌憚不知罪福謗無因果者多矣又以天理作門庭人欲爲行徑適足爲本教之累人心受病旣深道法乃其針砭所以古人道是無口過易無身過難無身過易無心過難言之於口人得而聞之行之於身人得而見之思之於心神得而知之人之聦明猶不可欺況神之聦明乎由是觀之治人心過非神不可道法豈容廢哉先生曰忠孝居百行之先中黄爲大道之秘凡我弟子皆當修身愼行然後推以濟物不然驅役鬼神徒增罪戾耳先生曰天下道理最大此前朝賢相之言也以愚見觀之世間至甚靈驗亦無如道理以理由道生故也順之則吉背之則凶每見曲昧道理之人或大言無當以尚氣或隂險私邪以求勝亦何所不極其至哉人力莫之能敵矣但造物者好生地不放過他縱被刑辟難免鬼誅豈造物者不仁邪良由彼軰自作自受之耳或問淨明法中驅治尚殺伐否先生曰大凡行法之士未消得峻責鬼神且要先凈除了自己胸腹間幾種魑魅魍魎則外邪自然息滅矣所謂魑魅魍魎者只是十二時中貪財好色邪僻姦狡胡思亂量的念頭便是也勦除此祟先要勇猛决烈無上之道因此成就況行法哉所以道是能治内祟方可降伏外邪若是不能清蕩内祟的人縱有些來小去靈驗天心終是未印可更思異時身謝之後却有執對的事來也或問淨除邪念有何法度先生曰道箇却在念頭幾微上工夫如何是幾微譬如惡木萌糵初生時便要和根剗却若侍佗成長起來枝葉延蔓除之較難了易曰履霜堅冰至言履霜之初要防備後地有堅冰隂氣轉盛時所以又曰君子見幾而作不俟終日先生曰此教法大槩只是學爲人之道淨明忠孝人人分内有也但要人自肯承當入此教者或仕宦或隱遯無往不可所貴忠君孝親奉先淑後至於夏葛冬裘渴飲飢食與世人略無少異只就方寸中用些整治工夫非比世俗所謂修行殊形異服廢絶人事没溺空無所以此學不至潔身亂倫害義傷教或問道法舊用奏申文字今只上家書無乃太簡乎先生曰古者忠臣孝子只是一念精誠感而遂通近代行法之士多不修己以求感動只靠燒化文字所以往往不應蓋惟德動天無遠弗届今此大教之行學者真箇平日能懲忿窒欲不昧心天則一旦有求於天舉念便是若平時恣忿縱欲違天背理一旦有求便寫奏申之詞百十紙燒化也濟不得事異時法子行持精熟時但是默奏自有感通家書不須亦可自迄古以來仙家化人多尚經章符呪之屬今淨明大教之興劈初頭便是壇記壇銘道說法說高文大論緫名淨明忠孝之書每用儒家文字開化何邪此是教法變通處經章符呪開化亦乆矣儒家往往視爲虚無荒唐之論今此都仙真君以實理正學更新教法縁仙材法器貴得明理之士相與拯世度生仰贊化育所以示此也淨明忠孝全書卷之三
