  text: 淨明忠孝全書卷之一
  hash: sha256:94c9103b6e54116aadf30ab47539ed94e99ec74f072f5cea4b232e624914552c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5e0012_HFL_001-001a, image: hfl/0757/0757-020.png}
body:
  text: 淨明傳教法師黃元吉編集嗣法弟子徐慧校正淨明道師旌陽許真君傳真君姓許氏名遜字敬之曾祖琰祖玉父肅世為許昌人高節不仕穎陽由之後也父漢末避地於豫章之南昌因家焉吳赤為二年己未母夫人夢金鳳銜珠墜於掌中因是有娠而生真君焉生而穎悟姿容秀偉少小通踈與物無忤嘗從獵射一麀鹿中之子墮龐母猶顧舐之未竟而斃因感悟即折棄弓矢剋意為學博通經史明天文地理律曆五行讖緯之書尤嗜神仙修鍊之術頗臻其妙聞西安吳猛得至人丁義神方乃往師之悉傳其祕遂與郭璞訪名山求善地為栖真之所得逍遙山金氏宅遂徙居之日以修鍊為事不求聞達鄉黨化其孝友交遊服其德義嘗有售鐵燈檠者因見漆剝處視之金也翌日訪其主還之朝廷屢加禮命不得已乃於太康元年起為蜀旌陽縣令時年四十二視事之初誡吏胥去貪鄙除煩細脫囚縶悉開諭以道教以忠孝慈仁忍愼勤儉吏民悅服咸願自新先是歲飢民無以輸租郡邑繩以法率多流移真君乃以神丹點瓦礫為金令人潛瘞于縣圃籍民之未輸者使服役于圃民钁地獲金得以輸納屬歲大疫死者十七八真君以所授神方拯治之符呪所及登時而愈至於沈痾無不痊者他郡病而至者日以千計於是標竹於郭外十里之江置符水於其中俾就竹下飲之其不能自至者汲歸飲之亦安蜀民為之謡曰人無竊盜吏無姦欺我君活人病無能為真君知晉室將亂乃棄官東歸民感惠贏糧而送者蔽野有至千里始還者有隨至其家願服役不返者乃於宅東之隙地結茇以居狀如營壘多改氏族以從真君之姓故號許家營焉真君嘗至新吳憩于柏樹林有女童五人各持寶劎來獻真君識其劎仙也異而受之故獲神劎之用乃於丹陽縣黃堂靖問道於諶母毋以所受孝道明王之法併蘭公所付孝悌王銅符鐵券金丹寶經授之且謂吳君曰君昔以神方為許君之師今孝道明王之道獨許君得傳君當返師之二君辭謝方心期每歲必來謁姆姆覺之曰子勿來吾即還帝鄉矣因取香茅一根南望擲之曰子歸認茅落處立吾祠歲秋一至足矣二君還於所居之南尋訪其茅已叢生矣遂建祠亦以黃堂名之厥後復遇日月二帝君授以淨明靈寶忠孝之道真君嘗過黃堂見鄉民烹宰祀神且相詫曰祭不腆則神怒降禍矣真君曰怪祟敢爾耶夜宿逆旅召風雷伐之又見民有遠汲者滿道乃以杖刺社前涸澤出泉以濟之雖旱不竭因渡江抵朱氏之肆主人雖貧迎接甚敬真君戲畫一松于其壁而去其家即日利市加倍嘗鍊神丹于艾城之黃龍山有蛟魅輒作洪水欲漂丹室真君遣神兵擒之針于石壁丹成祭于幕阜葛仙石室然後服之至修川愛其湍急味堅遂磨神劎於澗傍之石過西安縣分寧縣也社伯出謁真君詰其地分有妖物害民者其神匿之過一小廟廟神迎告曰此有蛟孽害民知仙君來故往鄂渚後將復還真君躡迹追至橋側勑吏兵驅出誅之怒西安社伯之不職錮其祠門止其祭祀今分寧城隍廟常閉開有火災今祀小廟今封協佑侯真君聞新吳有蛟為孽因往捕之蛟懼入溪穴乃以巨石書符以禁之時海昏之上遼有巨蛇據山為冗吐氣成雲亘四十里人觸在其氣中者即被吸吞江湖舟船亦遭覆溺大為民害真君乃集弟子將往誅之初入其界遠近居民競來告懇真君曰世運周流當斯厄會吾之此來當為汝曹除之誓不與此蛇俱生也於是卓劎于地默禱于天良久飛泉湧出有赤烏飛過遂前至蛇所蛇懼入冗乃飛符召海昏社伯驅之不能出復召南昌社公助之蛇出舉頭高十餘丈目若火炬吐毒衝天乃嘯命風雷指呼兵吏以攝伏之吳君乃飛步踏其首以劎劈其顙施君甘君引劎裂其腹有小蛇自腹中出長數丈奔行六七里聞鼓譟聲猶返顧母弟子請追戮之真君曰彼未為害不可妄誅五百年後若為民害吾當復出誅之以吾壇前松柏為驗其枝拂地乃其時也又預讖云吾仙去後一千二百四十年間五陵之內當出弟子八百人其師出於豫章大揚吾教郡江心忽生淵掩過沙井口者是其時也若此時小蛇為害彼八百人自當誅之苟無害於物亦不可誅也蛇子遂入江今新建縣吳城山是也大蛇既死其骨成洲今號蛇骨洲真君於經行之處立七靖以鎮之時晉懷帝永嘉六年壬申歲也真君道術高妙求為弟子者數百人却之不可乃化炭為美婦人以試之其不為所染污者唯十人耳凡周遊江湖無不從焉真君歸郡周覽城邑有一少年美風度衣冠甚偉通謁自稱姓愼禮貌甚恭應對敏給遽告去真君謂弟子曰適者非人老蛟之精來見試也吾故愚之庶盡得其醜類耳迹其所之乃化為黃牛卧于砂磧之上真君乃剪紙化黑牛往鬥之令施岑持劎俟其鬥酣即揮之中其股牛奔入城南井中真君遣符吏尋其蹤乃知直至長沙於賈誼井中出化為人即入賈玉史君之家先是蛟精慕玉之女美化為一少年謁之玉愛其才以女妻之居數歲生二子常以春夏之交孑然而出至秋則重載寶貨而歸蓋覆舟所獲也是秋陡還詒玉云為盜所劫且傷左股真君乃為醫士謁玉至其堂叱曰江湖蛟精害物非一吾尋蹤至此豈容逃遁速出速出蛟精計窮乃見本形為吏兵所誅二子亦皆為小蛟併誅之賈女亦幾變形真君給以符故得不變真君謂玉曰蛟精所居其下即水可速徙居玉從之其地果陷為潭深不可測真君復還豫章蛟之餘黨心不自安乃化為人訪真君弟子曰聞賢師有神劎願聞其功弟子曰吾師神劎指天天裂指地地拆指星辰則失度指江湖則逆流萬邪莫敢當神聖之寶也曰亦有不能傷者乎弟子戲之曰惟不能傷冬瓜葫蘆耳蛟以為誠然盡化其屬為冬瓜葫蘆浮泛滿江妖氣甚盛乃使施岑履水斬之真君曰此地蛟螭所居不有鎮之後且為患乃役鬼神於城南井鑄鐵為柱下施八索鈞鎖地脈祝之曰鐵柱若亞其妖再興吾當復出由是水妖屏斥城邑無虞岧嶢山頂有蛟湖三所其孔冗透大江通饒信真君誅其蛟立玉陽靖以鎮之又鑄鐵符鎮鄱陽湖口杜絶蛟魅出入之路鑄鐵蓋覆廬陵元潭制其淵藪仍以鐵符鎮之留一劎在焉明年復遊長沙郴衡諸郡所至為民除害凡立靖七十餘所明帝太寧二年將軍王敦舉兵內向次于湖真君與吳君往謁冀説止之時郭璞先在幕府乃因璞見之處仲延飲而問曰豫夢以一木破天君等以為如何吳君曰木上破天乃未字也公其未可妄動處仲已變令璞筮之璞曰無成仲曰豫壽幾何璞曰公若舉事禍將不久仲怒曰君壽幾何璞曰壽盡在今日日中仲大怒令武士擒璞斬之真君舉杯擲起化為白鴿飛繞梁間仲一舉目已失二君處仲竟敗二君還至金陵召龍挾舟從廬山紫霄峰金闕洞還至天寶洞遂歸舊隱日與弟子講究真詮數十年間不復以時事關意平時出處不異常人但所居鳴鶴飛翔景雲旋繞而已至孝武帝寧康二年甲戍八月朔旦有雲仗自天而下二仙降庭宣玉皇詔曰上詔學仙童子許遜卿在多劫之前積修至道勤苦備悉經緯逾深萬法千門罔不斯歷救災拔難除害蕩妖功濟生民名高玉曆衆真推仰宜有甄升可授九州都仙太史兼高明大使賜紫綵羽袍瓊旌寶節玉膏金丹各一合詔至奉行真君再拜登階受詔一仙曰余乃玉真上公崔子文一仙曰余乃元真上卿瑕丘仲告真君以沖舉之期遂去真君乃召門弟子與鄉曲耆老諭以行期設飲宴以敘别又與十一弟子各為五言一韻勸誡詩十首是月聖日大營齋會少長畢至日中遙聞音樂之聲祥雲四布羽蓋龍車從官兵衛仙童綵女前後導從二詔使又至復宣詔曰上詔學仙童子許遜脫子前世貪殺匿不祀先祖之罪録子今生行符呪水治病罰惡馘毒之功已仰潛山司命官傳金丹於下界閉債封形回子身及家口厨宅百好歸三天子急淨穢背土凌空左大力天丁與流金火鈐照辟中黃無或散漫仍封遠祖由玉虛僕射曾祖琰太微兵衛大夫先祖玉太極把業録籍典者父肅中嶽仙官賜所居宅曰仙曹左府玉真上公曰卿門弟子雖衆惟六人合從行餘各自有超舉之日乃揖真君升龍駕命陳勳時荷持册前導周廣曾亨驂御黃仁覽與其父族侍從盱烈與其母部從仙眷四十二口同時升舉雞犬亦隨逐飛騰留下修行鐘并一石函曰世變時遷即為陳迹聊以為記有僕許大者與其妻市米於西嶺聞真君飛升即奔馳而歸車覆遺米於地米皆復生比至哀泣求從行真君乃授以地仙之術夫婦皆隱于山中仙仗既舉有頃墜下藥臼車轂各一又墜一雞籠并鼠數枚墮地雖拖腸而不死意其嘗竊食丹藥也後人見之必為瑞應焉初真君回自旌陽奉蜀錦於諶姆製以為殿帷至是忽飛來旋繞於故宅之上復入雲霄真君生於吳大帝赤烏二年己未正月二十八日住世一百三十六年凡參學淨明弟子皆尊之曰道師君真君既飛升之後里人與其族孫簡就其地立祠以所遺詩一百二十首寫之竹簡令人探取以卜吉凶名曰聖籤其鐘車函臼並藏于祠隋煬帝時焚修中輟唐水淳中天師胡惠超重興建立明皇尤加寅奉宋朝太宗真宗仁宗皆賜御書改賜額曰玉隆仍禁名山樵采蠲租賦政和二年徽宗降玉册上尊號曰神功妙濟真君政和六年改觀為宫仍加萬壽二字五月一日旨付禮部云朕因看書于崇政殿恍然似夢見東華門北一道士戴九華冠披絳章服左右童子持劎紼皆衣青後有二使者綵衣道裝捧印杖前至丹墀起簡揖朕攀左龍尾上殿朕疑非人間道士因問卿何人不詔而至對曰吾為許旌陽權掌九天司職上帝詔往按察西瞿耶國經由故國觀見妖氣故來相訪朕請坐而問曰此患為何答曰湖南湖北三十六萬絹綱入水此實小龍為害蓋先朝不合封此子為王當永嘉之戮自拆毋腹而奔走未及害人因而赦之今乃輒為國家之患俟吾還當有處分不令住於江淮間矣朕夢中謝之復問曰朕患安息瘡諸藥不能愈真君有藥否即取小瓢傾藥一粒如菉豆大呵呪抹於瘡上覺如流酥灌體入骨清涼遂揖而去行數步復回顧曰吾弊舍久矣寥落願聖皇舉目一看為幸朕豁然而覺不數日有司奏到果然絹綱被風濤覆沒即取圖經考之見分寧縣梅山有許氏磨劎池詔畫像如夢中所見者賜上清儲祥宫以係省官錢新換數月後復夢真君回如初謝上曰分寧乃昔經行之處重勞建造吾卜地西山遺迹俱存但屋宇隘陋不足副四方膽視幸陛下一修整之耳上寤即詔洪州改修玉隆萬壽宫建炎中金人寇江左欲火宫庭俄而水自楹桷間出火不爇虜酋大驚乃書壁云金國龍虎上將軍來獻忠被授元帥府上畔都統大軍毁兹遍觀聖像裝嚴華麗不敢焚燬時天會八年正月初二日記主觀想知悉戢兵而去凡真君所遺物皆有神守護不可觸犯殿前手植柏其榮悴常兆宫之盛衰剪以煎湯無疾不療丹井舊有神龍出沒後胡洞真以符石鎮之鐵柱唐嚴撰作州牧心頗不信嘗令發掘俄迅雷烈風江波泛溢城郭震動撰懼叩頭悔謝久而後止又強取修行鐘置之僧寺擊之聲如土木乃送還宫車轂州牧徐登令取至府猶未及觀即夕飛還石函雖有窾縫而不可開唐張善安竊據洪州強鑿開之其蓋內丹書云五百年狂賊張善安開之善安懼磨洗其字終不能滅遂藏其蓋凡真君遺迹有異處如龍沙側之磨劎池其沙壁立略不湮塞新建縣之嘆早湖水蛭至多以藥投之水絶松湖市之旅邸至今無蚊蚋豐城縣杪針洞蛟入其中以杉木楔之至今不朽奉新縣之藏溪蛟藏其中以劎劈裂溪傍巨石書符鎮之如此等類莫可殫舉元成宗皇帝加封號曰至道玄應神功妙濟真君淨明經師洪崖先生傳經師姓張名氲號洪崖又名藴字藏真世代皆莫詳與赤松子俱為神農師真詰云洪崖先生今為青城仙伯是也隋時復出現於晉陽之姑射山又現於豫章之西山讀書釣魚於城西河岸之石磯今釣魚臺是也開皇九年改豫章為洪州以先生故也先生身長七尺五寸眉目疏秀語音如鐘善琴書喜長嘯嘗遇日月二君授以淨明靈寶忠孝之道時戴烏帽或時角巾或櫳榛巾被鹿裘或衣紅焦葛衫為犀帶短靿靴每行則乘一白騾曰雪精從五童子名狀並怪曰橘栗术葛柮負六角扇垂雲笠又曰白藤笠方木鐙二玄書木如意笻竹杖長生瓢魏惠壺不柱杓又曰長盈壺長滿杯自然流酌出入城郭朝來暮去人莫測其蹤唐武后聖曆中召不赴玄宗開元中復召見於湛露殿上從容問曰聞先生善長嘯可得聞乎於是應聲而發音韻清絶上曰朕何如堯舜先生何似許由先生對曰陛下道超堯舜臣德謝許由昔堯召許由而不至今陛下召臣而臣來上嘉之拜太常卿纍至司徒皆不受一日奏曰陛下何惜一山一水不令臣追蹤巢由乃詎還山遂絶粒服氣時時出沒往來於西山姑射二山多遊終南太華青城王屋山中與東羅二大師為侣每述金丹華池之事易形鍊化之術人莫究其微妙焉又每旦乘白騾領僕從由西山渡章江入洪城人未有見其返者一日章江舟人心切疑之遂戒其子躡蹤觀其所以乃賣藥周遊市中卒之晉尚書潛惠武陽彭仙故宅宗華福地今彭真觀是也與其學仙之徒掃石焚香談玄閲祕圍棋握槊諷詠逾時已而乘白騾與僕從俱入彭仙舊鍊丹井中而去舟人子復躡其後而先生未之知其中道塗坦然行未久忽聞櫓聲舟人子曰此我舟中櫓聲也先生始覺問之乃實告其故復問曰汝願偕往否曰不願於是令其瞑目以手摩其頂舟人子即在舟中矣自是不復入城如此者九十三年後隱去不知所終今西山有洪崖井與烏晶源為鄰深不可測無冬夏飛流奔瀉若雷殷地中人雖對語亦莫能聽三伏炎蒸寒氣襲人毛髮森竪古傳與彭仙丹井通焉井畔多楓樹先生丹成跨雪精從楓樹升雲鄉至今樹上有雪精遺迹井之西有紫清宫舊為應聖宫即先生栖真所也有三詩刻于石其一曰去歲無田種今春乏酒材從他花鳥笑佯醉卧樓臺其二曰下調無人采高心又被嗔不知時俗意教我若為人其三曰入市非求利過朝不為名有時陪俗物相伴且營營嘗注老子周易三禮穀梁傳行于世凡參學淨明者尊為經師君淨明法師洞真先生傳先生姓胡名慧超一名化俗字拔俗不知何許人亦莫詳其年人問之則曰今年五十二歲後數十載問之亦復云然容貌雄偉氣宇魁岸獨處則無異於常人在衆中則獨出人一頭故時人稱之曰胡長仙逢人不執手板擎拳而已嘗遇日月二君授以淨明靈寶忠孝之道神妙無方人莫能測唐初隱于洪州西山之洪井時往來洪城一日散步市中見一民家悲戚先生問之答曰城側有廟神歲擇女子以配吾女明日當行是以悲也先生曰吾當為汝除之於是嘯命風雷焚擊神廟併廟側一巨樟根下白骨無數拔其根擲于江中逆流而上至清江境今樟樹鎮即其地也州人感激於廟所立觀今豫章玄妙觀是也唐貞觀中太宗皇帝聞風召之不赴高宗即位復召先生乃赴館于禁中時宫中有妖夜出傷人上曰禁中有妖師能除之否先生曰諾乃遍行宫中至西掖垣下指曰妖在此命武士掘之入地數尺得老狐十數隻併白骨甚多殺之妖乃絶上大悅賞賜皆不受力求還山上許之詔百官祖餞御製詩為别乃還居西山遊幃觀時觀荒廢先生因問主觀胡不修葺答以乏財力先生徑往不逾月以木筏至高安樟木江口距九十里命筏人緊繫縳各就宿江岸臨暮飛墨符一道中夜烈風雷雨比明筏已在壇下矣淩抹嶺谷所當之路林木披靡又於山下發一窖出錢三百千為工役之所需應殿字非人所為者皆夜役鬼神為之門外鑿七井以禁火災則天復召見於武成殿問神仙事先生止陳道德帝王治化之源即辭乞還山勑遣使齎金璧送歸行次單父賜書曰先生道德高尚早出塵俗如軒曆之廣成漢朝之河上遂能不遠千里來赴三川日御先開望霓裳之漸遠天津後渡膽鶴蓋以方遙空睇風雲惆悵無已還於洪崖先生古壇鍊丹首尾三年詔趣詣闕館于禁中一朝遁去上歎恨久之遣使齎贈甚厚還居西山盱母靖曰吾昔到此客于盱母今已數百年長安三年命弟子於遊幃觀之西北伏龍造磚墳藏太玄真符二七星劎靈寶策杖各一三日而訖先生正衣冠坐繩床空中雲鶴旋繞墻外人馬之聲不絶而先生已化矣州具以聞朝命賜諡曰洞真先生凡參學淨明弟子皆尊之曰法師君淨明監度師郭先生傳先生姓郭名璞字景純河東人也好經術博學有竒才而訥於言論善詞賦為東晉之冠好古文竒字妙於隂陽術數有郭公者客河東精於卜筮先生往師之公以青囊書九卷授之由是洞達五行天文地理卜筮之術為人禳災轉禍妙用無方惠懷之際先生知中原將亂乃避地東南抵將軍趙固會固所乘良馬死固惜之不接賔客先生曰吾能活馬吏入白固出求教先生曰今健夫二三十輩皆持長竿東行三十里有丘林社廟便以竿拍之當得一物急持以歸得此活馬矣固如其言果得一物如猴持以歸此物見死馬即噓吸其鼻頃之馬起如常物忽不見元帝渡江後王導辟為參軍先生事母至孝母死自卜葬地於暨陽去水才百步人以近水為言先生曰即為陸矣未幾沙漲去墓數十里皆為桑田明帝大明二年甲申王敦舉兵反次于湖先生往見之敦曰吾夢以一木破天此何祥也先生曰一木破天乃未字也明公舉事必敗無成因極言忠孝之大義敦怒曰吾壽幾何先生曰若恪守臣節壽未可量若改之不速禍將不久敦曰君壽幾何先生曰吾命盡今日日中敦愈怒命斬之即有見先生於丹陽市者世以為兵解云所著詩賦誄頌數萬言洞林經六十卷新林十卷卜韻一篇注爾雅三蒼方言穆天子傳山海經皆傳于世凡參學淨明弟子皆尊曰監度師君西山隱士玉真劉先生傳先生姓劉諱玉字頤真玉真子其號也其先番易石門人高祖宗翰遷南康建昌名所居里曰石門示不忘本也宋紹興中擢第授滁州來安簿世傳詩禮父剛母塢氏以寶祐丁巳八月二十日生先生是早紅霞覆屋鄰曲駭異其父再遷隆興新建忠孝鄉先生夙有卓識五歲就學讀書務通大義弱冠父母繼亡居喪盡禮家貧力耕而食視塵世事不足為篤志於神仙之學初都仙太史許真君以晉寧康甲戍歲於豫章西山升仙嘗留讖記云吾仙去後一千二百四十年間五陵之內當出弟子今作地仙誤也八百人師出豫章河西岸大揚吾教郡江心忽生沙洲掩過沙井口者是其時也至建炎戊申僅七百年兵禍煽結民物塗炭何真公等致禱真君丐垂救度既而降神渝川諭以辛亥八月望當降玉隆宫至期迎俟日中雲霧鬱勃自天而下由殿西徑升玉册殿降授飛仙度人經淨明忠孝大法真公得之建冀真壇傳度弟子五百餘人消禳厄會民賴以安逮今二百餘年其法寖微至元壬午朝命改隆興路為龍興其年五月章江門外生一洲是秋先生經行西山瀉油岡遇洞真天師胡君告以姓字先生拜問曰天師胡為在此曰龍沙已生淨明大教將興當出八百弟子汝為之師歲在丙申臘月庚申真君下降子家子際遇如何真公時今在子夜故來告子言訖不見先生心竊自喜明年春復於玉隆禁山遇之即下拜胡君曰吾今再來實傳真君之旨可尋西山中黃堂山為晶原建玉真壇以栖隱當知真君即太陽帝君化生仙傳謂生身有金鳳銜珠夢兆者非也乃日中金烏流精在天為氣在地成形鴻濛開闢降於洪井却至海藏至真君降世乃由扶桑之墟下貫崑崙之頂乃從風輪水淵由地中行騰出洪崖之井以應西山之氣故其地名曰烏晶原蓋日月二君屬記真君以為後代傳道之信其所在之處萬靈護持出沒變化非容人力真君降於吳赤烏己未歲正月二十八日戊午己未為火在天上初元戊午表太陽也二年己未表餘氣化生也正月表人道始於寅也二十八日表近晦而續明也天啓仙運年符赤烏其後海昏誅蛇有赤為飛過亦應此耳今仙運將周烏晶出現其在青羊之歲上元之辰紫清宫中子得以鎮靖廬大教興矣因與言淨明之旨踰時而别及出山已越兩日先生自是益加精進又於孝行里立騰勝道院以善道勸化遠近聞知仰嚮從遊者衆甲午十一月甲子遇水府仙伯郭君教以經山緯水之術遂遊黃堂山烏晶原尋訪果得魏道人故居乃昔日真君修真之所而又洪崖先生張君舊隱地隸紫清以田易之而卜築且定居焉靈官鄧君貽詩有曰洪崖尋舊迹合讖於松沙者謂此也元貞己未正月甲寅先生神遊玉真府遇真君與張君胡君玉真朝元回先生作禮真君顧令先生求見陽烏張君袖出三足烏示之上元庚申先生往紫清與弟子王真定方公成登拍洪樓焚香默禱聞硫氣郁烈倚闌候望倏有流光飛墜爐間俯視則烏晶在焉大如椰子非鐵非石而黑潤沈重受而藏之是夕胡君授以大道説明年歲晚復至紫清告諸弟子以師君將降約同候迎十二月庚申王真定方公成胡次由輩同集先生之舍先生曰有一士緣重當不召而至是夕雪大作初更時玉隆宫法子黃元吉忽至先生曰天寒歲晚遠來何為元吉曰夜來夢胡天師告曰劉玉真家有盛事汝可速往故來先生於是與諸弟子明燎爇薰至誠以俟夜將半先生凝望虛空倏忽間師君至亟率弟子下階迎拜黃氣瀰漫非煙非霧擁升堂上降授玉真靈寶壇記紙尾署云弟子劉玉真丁酉正月甲子朔旦登山巔授至道頃之光景豁散既而郭君授以壇疏除夕寒雪隂霾先生清齋以待夜過半山堂門開介胃神人至前曰真君召子乃篝燈躋攀而上仰視天星朗然少焉仙駕降先生膽禮以柏葉藉棗橘以進真君告曰兹山前俯鸞岡後據鶴嶺吾昔修真時於此朝禮太上太上命日月二君降此授吾至道是名靈寶朝天壇吾今亦於此授此中黃大道八極真詮子當敬受吾八百弟子汝為首英名氏悉在華林八百洞天久矣刻書青琅高揭丹崖更當勉勵弟子不昧心君不戕性命忠孝存心方便濟物異日功成果滿胥會洞中顧不樂歟此外精心奉教隨所修積各享其報終不沈墮若有不自提策勤始怠終則有風刀之考子今恢演教法積纍功勳再世三生鍊消隂滓登晨白日如吾無異勉之勉之言畢高舉先生拜送瞻望極日而還十月甲午寓玉隆清逸堂丙申胡君復來授以道法説及三五飛步正一斬邪之旨由是開闡大教誘誨後學其法以忠孝為本敬天崇道濟生度死為事簡而不繁諸弟子問曰昔何真公所傳稍繁今先生所授極簡何其不同先生曰昔紹興之時仙期懸隔權以救世以法弘教故繁今龍沙已生仙期迫近急於度人以道宏教故約此所以異然其至則一無庸疑因謂曰吾與若輩幸以宿因遭逢大教喜慶難言今靖廬粗備相與首致華封之祝以寓吾忠次伸追遠之誠以昭吾孝修身愼行植德行道可無愧矣今為若輩懇師君請降日精月華鍊度先亡以除冥纍十月望乃登朝天壇露香敷奏席地存神置二陶器於壇上俄東西布飛光二道如金線自天際注器中左液如丹右津如汞用以書符訖事無餘越七日弟子咸夢先亡言感真君拯拔陶鑄返隂生陽已升仙階矣明年十月庚申郭君復至授以法説而鄧君數來談易故先生於易尤邃方公成嘗言爻象夜分風動燭滅先生一噓而燭復然公成驚問先生徐曰子言紙上之易而未知身中之易如知之則已滅者可復明又何所怪公成下拜願卒為弟子居常與群仙接對而張胡郭鄧為密張君嘗招之過洪井擲扇水中命之浮渡又與如意丹方令采洪井石蒲為藥以施病者郭君嘗引遊水府見門下鎖一巨青猴指曰此神禹所禁巫支祁也先生雖道行日隆而益自韜晦間為人祈禬禳解無不出竒隱真洞真靖廬次第興建諸品祕要相繼授受至大戊申正月丁卯投烏晶於洪井曰緣重者得之即以傳教之任付黃元吉謂曰吾此生為大教初機而來異時再出當與八百弟子俱會今陽數將終身謝之後以吾遺體靜夜火之復骨於招賢之原三年將遷瘞海島二月癸已如紫清宫翠岩寺告别甲午示疾弟子畢集丙申晨興端坐榻上日正中舉手拱揖就榻側卧而逝春秋五十有二弟子遵遺旨而送終後三年啓窆視之唯存空函先生之學本於正心誠意而見於真踐實履不矯亢以為高不詭隨以為順不妄語不多言言必關於天理世教於三教之旨了然解悟而以老氏為宗有玉真語録淨明祕旨凡一百三十七品云中黃先生碑銘黃君元吉宇希文豫章豐城名族父良俊母吳氏年十二入玉隆萬壽宫事清逸堂朱尊師朱殁其師王月航尊師愛而教之王尊師嚴潔清儉有古人之意善醫藥施謝之積粗瞻即閉户絶來求醫者希文請授其術以為業王尊師不可曰吾非有靳於子也顧醫道甚精微識慮稍不至則人由我而死非易事也將以此為利益不宜吾幸得舍此不為冀寡過耳誠慮返纍子不如歸求清靜以自致也王尊師沒久之西山中有劉玉真先生者本質行老儒隱居深僻有神明之遇曰晉旌陽許君千年龍沙之記今及其時而劉則八百仙人之首云獨重希文以為可托及去世以其傳囑焉蓋其説以本心淨明為要而制行必以忠孝為貴而已希文事劉先生如父事其夫人如母苟遠去飲食必祝之而後嘗奉其言如臨天地鬼神乃即其山擇地立玉真隱真洞真之壇以授弟子至治三年又以其説遊京師公卿大夫士多禮問之莫不歎異明年太定改元嗣漢三十九代張天師朝京廷臣薦希文者曰中黃先生剛介堅鷙長於幹裁響嘗都監其宫治衆嚴甚人或不樂而土田之入廬舍之完公而成功昔為忤者更交譽之親之其後從玉真先生得旌陽忠孝之教蓋折節就沖淡為達人巨公前席宜表異之乃為書請希文為淨明崇德弘道法師教門高士玉隆萬壽宫焚修提點未行玄教大宗師留之崇真萬壽宫期年將以其名上聞奏且上有爾書之賜而希文翛然高居唯以發明其師説為己事有所謂清虛日來滓穢盡淨者蓋庶幾焉十二月十一日為書寄别其弟子陳天和等而命從者曰今夜子時當報我及期從者以告希文曰吾返玉真之墟矣明日用火淨吾骨於城東門外薪盡火絶有風南來者吾報汝也已而果然從者負其遺劎將歸藏西山希文在世五十五年為道士四十年度弟子陳天和劉真傳熊玄暉劉思復黃通理授淨明忠孝之教者人衆不可備列中山趙先生有道之士也嘗與希文俱來為之言曰子為銘其藏豫重趙君之請故為之銘曰西山之墟古仙宅竒蹤一隱兩五百陽精發輝表靈赫我與受書繼玄德長生不死為世則忽焉去之不可測鏘金為音玉為畫表歸真土填無極丹扃道人事實丹扃子姓徐氏名異一名慧字子竒至元辛卯八月二十七日寅時生娶劉氏生子師晉其先為豐城望族仕廬陵因家焉其大父愚谷先生典刑慱雅前宋試場屋有聲二子俱早世子竒幼孤即穎異恥與俗子友閉户讀書危坐竟日養吾劉先生為須溪冢嫡時稱為文章司命人物權衡得其許可者如登龍門始八月旦子竒嘗侍大父往謁之一見問所學即令以詩題子竒援筆立就先生大加賞歎因取少陵徐卿二子生絶竒之語改字子竒且為序其所作詩集稱其五言高處春容淡泊頗近古意至於近體亦變化流麗蓋其天分之高而學所致也其推許之意槩可見矣戊午春慨然為金臺遊首以文墨見知于御史李一飛典瑞院使馬九臯右丞齊峰平章大慈都由是鈞樞臺閣名公巨卿多所接禮癸亥春英廟詔書金經試字中書者數百人子竒首中前列未幾經事竟寢子竒聞中黃先生得都仙淨明之道駐于崇真宫遂往師焉中黃一見曰夜夢子今子來似有夙契當宏吾教自是盡得中黃八極之妙又參藍真人于長春宫得全真無為之旨賜號淨明配道格神昭效法師由是人爵無復介其心胸雖中朝貴人交剡互辟恬不能動其心矣甲子春以母老竟歸圖為色養計其所以婉容娛侍曲意順承無所不用其極如是者二十餘年逮終喪葬盡禮初歸之日家適病疫或曰未可歸子竒曰安有及門而不升堂拜母者乎竟歸其所謂神明憑依者皆辟易解散若未病然自非道高德重安能殄息若此其速也是歲大旱鄉人請禱于里之吉安嬌旋慰霓望自是弟子益衆及其門者皆文學特達之士雖六七十翁皆願從焉曰吾師道也子竒倜儻尚氣節慷慨尚然諾導悟學者剖決玄微海竭河傾源窮派析犂然有當於人心數十年間千百里內水旱豐凶請禱即往神動天隨雷電隨應其所以化赤地為豐年掃積隂為霽景者不知其幾焉至如來病士庶是以為瘧豕人之啼泣木客之憑凌雲篆一飛隂怪旋屏若此者尤衆也是其操存持守之不息故光輝昭著之自然有諸中形諸外也士君子常稱竒峰先生又稱丹扃道人蓋其為室也清虛明淨扁以丹扃留國張公書而記之詩集曰杯水玉霄滕公序之所傳淨明忠孝諸書先以刊行至於手撰科文正大雅潔凡若干卷傳于世庚寅春寄內師府羅文奎詩云憶昔長廊聽雨時黃金染筆寫烏絲百年似夢我先覺萬事如雲子尚癡天上故人天上老里中野客里中嬉臨風聊致拳拳意老病無才懶賦詩又寄臺使盛熙明詩云向來風雨意俯仰十年餘雖有千山隔寧無數字書栖遲吾分耳富貴易交乎珍重平生學風雲展壯圖又寄别弟子鍾彥文詩云花甲今年恰一周安心安分更何求夢回池草春生筆吟到江梅月滿樓生數又從今曰始老懷不及少年遊還丹鍊就身如葉洞府名山任去留又自贊其像曰生前我即汝死後汝即我於是二中間誰曾識真我咦月輪元不在波心四海五湖無不可至五月望日命弟子蕭尚賢代謝師仙將吏為酒食以召鄉黨朋友話别對坐客云天香繞屋家肥潤玉宇開基仕顯超明旦日中索紙筆留頌云這箇臭皮袋撇了無望礙烈焰紅爐中明月清風外擲筆端坐鼻流玉筋尺餘移時視之則已去矣留形住世六十年度弟子數百人淨明忠孝全書卷之一
