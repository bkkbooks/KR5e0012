front:
  text: 淨明忠孝全書卷之四奉七
  hash: sha256:b97cd55d69fab0f7963bf7c2bece8b5ecda6840d0378f51cb4eebbcaa052a24b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5e0012_HFL_004-001a, image: hfl/0757/0757-124.png}
body:
  text: 凈明傳教法師黄元吉編集嗣派弟子徐慧校正玉真先生語錄外集先生曰入吾忠孝大道之門者皆當祝國壽報親恩爲第一事次願雨暘順序年穀豐登普天率土咸慶昇平先生曰龍沙記都仙言之千年之前具載豫章職方乗流傳至今三尺童子莫不知之非駕空無根之論也龍沙自至元壬午生洲綿亘豫章江心非荒唐無驗之說也本淨元明心學之妙課忠責孝大教之典不離日用常行之道非幻譎怪誕之術也真是千載一時不可逢之嘉會學者勉乎哉或問都仙真君化生之事可得聞乎先生曰都仙於開闢之後實禀太陽餘氣而生猶木星之有紫炁其三生之前降神母胎所以母夫人夢吞赤鳥之精而孕後世誤傳金鳳銜珠也生而不凡長而學道内鍊已成陽數告終是名曰死及再現世間則不假父母遺體矣積修至道内鍊益明又復蛻形者示民有終也暨三生出現則正當吴赤烏二年建元改號有開必先仙身住世内鍊轉轉明淨及上昇之後在天爲星所謂本體圓明形而上者又曰傳說騎箕尾者即此之義也或問曰昨承師教以都仙真君三生出現不假父母遺體審如此縁何又有仙眷先生曰都仙三生出現時内鍊已成不比凡夫中隂之身投胎中隂投胎者全假父母精血而成仙身托胎者純陽之體聚成形散成炁借寓而已所以不同常人假父母遺體也出胎之後依然冠婚仕宦蓋借此示現以明人倫以行忠孝所以有父母妻子之屬孝廉之舉縣令之除仙身示現凡身焉得而無眷聚哉或問都仙真君拔宅飛昇之事有之乎先生曰非謂血肉之軀厨宅雞犬高入九霄也蓋得道之士鍊之又鍊内鍊旣精隂滓消盡通體純陽聚則成形散則成氣飄然上征輕清者歸于天無可疑者若論厨宅雞犬則主人道果旣圓自有神物挾之而去止在海外諸洲島間耳先生曰雷霆者隂陽二氣耳却有善惡二神主之陽氣爲雷隂氣爲霆雷有聲霆無聲雷性善霆性惡雷好生霆主殺凡令隂霆擊物者非必一一出於上帝諄諄然命之也蓋世間惡類不善之氣自然感召如人之不忠不孝物之蠹害元氣者肅殺之機不能容隱其隂氣旣降渣滓不能復升者在地成形謂之雷斧者是也蓋陽雷之動專主發生啓蟄隂霆之動專主傷殺焚擊亦各從其類耳所以霆擊之所雷必給水愈人之疾亦是神物將功補過不失好生之德凡霆擊物本處不覺而遠聞霹靂一聲乃是陽雷攝上隂霆之氣縁此二氣不可須臾離故耳如鍊靈砂其硫黄禀太陽餘氣水銀禀太隂餘氣二物凝結而成凡鼎之爆裂者實硫黄爲之也硫黄一動水銀即隨之亦隂從陽之義與陽雷攝隂霆之意等耳或問曰先儒言雷霆只是隂陽二氣凝聚奮擊而然言亦不及雷車石斧之屬何以道教中却有雷神姓名服色不一果有之耶果無之耶願釋其疑先生曰皆是也吾聞大道之全有渾然有粲然今夫雷霆一隂一陽其原實出先天之道所謂渾然者是也朱子有云未發之前氣不用事若誅擊世間不孝惡物之類則實有雷神奉行所謂粲然者是也若帝武乙慢天獵河謂之閭而遭震死則見之史矣今天動咸必彰周公之德則見經矣渾然者先天之道粲然者後天之氣譬如王命征討不庭穆清所出此乃氣才用事之時秪是綸音初未見行陣之類比似渾然之道一般綸音纔發出去則將帥旌旗士馬戈甲頗臨彼境矣非粲然乎又如發蟄行春驅龍降雨推此亦可知大概真儒抱先天之學只認著渾然之道談多不及後天之詳非不知也特不言耳後天法家只認著雷霆天將之屬無非粲然之氣有時開佗雷霆起處多是漫不加省箇中惟有曾踏上頭關的親見過來也先天後天渾然粲然無有不是又曰乾爲天降而爲露坤爲地升而爲霧一升一降爲甘露艮爲山山藏雲震爲雷震動發生萬物巽爲風風生巽位離爲火故有雷坎屬水出霆而行殺伐兊爲澤金生水雨部屬之或問隂陽二氣化形之理先生曰隂搏陽激發而爲雷隂凝陽流走而爲電隂弱陽盛起而爲風隂盛陽弱聚而爲雲隂陽升降蒸而爲雨隂陽舒和降而爲雪隂否陽潰飛而爲霜隂散陽泰布而爲露升降不能化而爲霧隂陽不暢結而爲雹淫水爲霓淫火爲魃或問世間有一種不務德行之士行道法則符將顯驗此理如何先生曰此輩是宿生曾於道教香火中積累功縁來故今生受此報答雖然若更能崇行而知道方謂之不朽功能若不理道德則不過一期適意耳異時身後㝠㝠中事緒亦不少矣或問淨明法中符命何其簡而又簡也先生曰符者契合之義先天符命下筆多尚輕清又不須執泥篆文糺結者方謂之符此中作用契合於道便謂之符所以符同不過直書四字而已用至圓象時所謂元炁歸根神力最重凡所到處陽道勝隂如日消冰所攖者摧所觸者破視生意露在芒端者有間矣或問周程朱張諸儒先著書立言多是力闢虚无寂滅之教何邪先生曰彼皆天人也皆自仙佛中來以公心爲道故生於儒中救世偏弊耳大概三家之學皆是化人歸善世間皆闕不得但二氏之教若過盛則於綱常之教未免有所傷如乗舟之偏重則須移身而正之舟平始可行道亦猶是也又二氏真人真僧則皆是人欲淨盡純然天性奈何如此者少末流之弊每多真儒於是乎出以實理正學而振飾之旣振飾已翛然而逝復歸天人境中矣又問何以見得是天人曰但看他剖析太極之妙處便是學有所得的人非天人而何若道諸先儒就裏無自得之妙周子如何作出太極圖與通書程子如何註易恁地合道至如邵子皇極經世書全是百原深山中靜坐工夫發現出來晦庵南軒之註四書皆是退有所據的人象山若無所得如何做得一代宗師臨終祈雪一事尤爲竒特若是杜撰漢如何服得天下後世人心要知真儒都是戒愼恐懼中做將出來親見道體後說出話來真是俯仰無愧又問今說諸儒是天人有何所據曰謹按蜀本青元真人所註度人經云三界之上四種民天多是歷代聖君賢臣居之如羲文周孔之徒是也浩劫交周鴻濛開闢此諸天人降生人間開物成務以教民庶爲民之種故稱種民舊見林侍宸傳一日入朝見元祐姦黨碑司馬光程頤等諸名賢姓名皆在上林公向之稽首上怪問卿何故作禮林曰時相輩捐爲奸黨臣等見之多是星宿之名又如康節臨終時言吾夢旌旗鶴鴈導吾行萬山中吾神逝矣晦庵亦自是武夷洞天神仙出來扶儒教一遍晚節盤桓山中文墨可見紫清白玉蟾亦甚加敬贊其遺像有云皇極墜地公歸于天武夷松竹落日鳴蟬又云兩楹之夢旣往一唯之妙不傳晦庵亦曾註周易參同契來多與鐵柱宫道士傅雲庵談道有詩贈云到處逢人說傳顚相看知是幾生前直携北斗傾天漢去作龍宫第二仙至今手澤遺像留本宫種德堂然諸先儒語言文字中止塞抑遏之辭隱然是世道之福二教之福時人不覺爾靜思方見得道道理出又問世間止存儒教可乎曰是何言歟若二氏之教可滅則天滅之久矣何至今日後之學者凡見先儒言語文字要體認得大意是振飾世教不必膠柱鼓瑟泥其文辭可也且宜泯默自修爲是間有未量己之德行望見先儒言語於是極口觝排何如貼身且看自己生平於事先奉親分上無欠缺否能自拔於利欲之中實如古人冰糵自處否能不愧暗室屋漏否若踐履事事是得先儒了又須念周程張朱輩皆是再來的人皆是有福的人我未能然不可更添言語也大凡人自己本來福積不厚肆口又無忌憚愈見薄福去要見薄福的證驗平生數竒多忤不如意事十常八九處便是也福薄後業愈重矣業重則再出頭來面目又别了大概仙佛自是累劫修積大福大德之人於救世護生不可謂之無功未庸輕議之也其實世間聦明之士無惜自修其本進進不已到得聖賢地位時點頭一笑方知吾言之不妄先生曰釋氏警策有云父母不供甘㫖六親固已棄離不能安國治邦家業頓捐繼嗣如此看來出家之士甚有濟河焚舟氣象矣當作如是思惟退步則其舟已焚進前自應努力所謂努力者精持戒行一心在道或勤勞材幹香火功縁他時自然有好收因結果若不能思惟策中四句猶且躭酒嗜肉好色貪財與下俗無少異熙熙度日悠悠一生不覺不知尖檐兩頭脫也何況不耕而食不蠶而衣日受人天供養全無慚愧不知補報却是樂中受了苦中還佗惡境臨身悔之何及細細思之或問祈禱亦有卒無感應者何耶先生曰雨陽關係天地間生意至誠求請烏得不應若平日操修涵養不能上合天心一旦欲求其應不亦難乎人事盡時天理自見或問諸家鍊度動是百十道符完形續體今淨明只是鍊度一符無乃太簡乎先生曰至道不煩只是以善化惡以陽制隂收萬歸三收三歸一鍊消隂滓身淨自然化生每見後天之法不曾究竟得一箇大本領搬出許多枝梢花葉徒爲已墮之魂重添許多妄想淨明先天之學只要了得核中有箇仁仁中有一點生意藏之土中春氣纔動根生幹長都出自然豈曾見天公親刻枝葉也哉又曰夜靜則隂靈易達日陽則地祇難通事關幽㝠須用靜夜又問教中鍊度之法簡切之妙旣聞命矣但一暘之義可得聞乎曰混沌之初譬如一滿甕中純是濁水相似澄湛旣乆輕清上浮重濁下沈天地分矣上下纔分便有一點真陽生於其中名之爲日者是也據某看來自古及今天地之中只是一點陽光爲之主宰足以鎮世所謂隂者不是别有一物只是陽之影耳所以道是隂從陽又道是隂陽不須臾離經云太陽真精爲萬物祖又云月本無光望如黑鑑日滉水光映以爲明又經云月待日明亦是此義也又云九陽之精爲日十隂之精爲月日月之精和合爲星辰以此觀之星月皆受日之光見得天地間分明只是一點陽光爲萬物主宰但舉一暘二字則星月之光皆在其中若說三光則涉支離分散若舉一暘則是歸併底說話木本水源歸根復命元氣聚一豈不妙哉又問何不只寫隂陽之陽字今寫日傍暘字是取何義曰按韻註暘是日出又是日氣蓋爲一切幽亡魂類當初眼光落地時全體歸隂所以曰幽關又曰長夜受諸苦惱不覩光明故今而受鍊者仰承陽光照射譬如更闌昏黑忽覩海角光生萬物精神相照又如積雨開霽人情自然舒暢和悅所謂日出者此也若頻頻受鍊者積陽自生温暖之氣一如寒谷回春雪消冰解草木群品萌芽迸發生意盎然矣所謂日氣者此也一暘鍊度其義如此或問前云隂是陽之影果爾隂中有主宰之神也無先生曰陽有陽之至神太陽上帝是也隂有隂之至神太隂皇君是也烏得而無主宰聖人尊陽貴隂蓋以此義又曰但是人身之影亦有神道書言人影益炬可數至九數九影之神亦各有名古者有相人影濃淡知貴賤壽夭有艾灸人影療病者又如蠱蜮之類皆射人影而肆毒者烏得無神又問兩曜中間日烏月兔是取何義曰日體外陽而内隂月質外隂而内陽日中金烏實表陽中之隂月中玉兔實表隂中之陽所以曰坎離之精互藏其宅余昔面受都仙之㫖教令作鍊度火符先於圓象中心著一墨點水符先於圓象中心著一朱點正取水隂根陽火陽根隂之義所以經云玄爲縞兔交以天精蓋表隂陽生生不窮之妙理也或問淨明告斗之法何爲不設斗燈何爲符命絶少先生曰汝知星斗之所出乎太極一真之源也由太極而生隂陽五行天賦人受謂之建順五常經云日月五星謂之三光其配屬者謂之大魁七元陽明貪狼隂精巨門即是日月其餘五星即屬五行七曜大明彰示萬方者只是天地中間二五之精却皆屬後天返真還元同歸太極而歸無形是爲淨明大道先天之宗本也所以通真達靈貴在得氣之先今向淨明二曜九氣之燈焚符所告者昔都仙真君有㫖云此名先天之斗蓋指太極而言也譬如尋流泝源著衣舉領先天之法貴乎簡者就發端處用工故不疾而速不行而至雖然若不知自己身中中黄太乙之妙又焉能感動天心北極也哉若只靠存想之繁符篆之多吾但見其神離氣散耳一真之妙竟復何在以是觀之若無本領之士此法亦未易行也或問都仙真君斬蛟之劎可得聞乎先生曰道劎也智鍔慧鋒實出一氣未發之先寂然不動所謂形而上者謂之道旣發之後形而下者謂之器如星殞於地而爲石霆所擊處有遺斧即隂氣之渣滓今廬陵玄潭觀所藏之劎非鐵非石長不踰尺實智鍔慧鋒之渣滓也或問世傳都仙真君役鬼工鑄鐵柱之說有之乎先生曰神道設教普化下根其實只是地之精華融結成形其出現也有應驗有時節當時都仙道果圓成天地之氣無不應驗此柱非假鎔鑄自然出現以鎮壓一境耳如魏青龍年張掖柳谷口水溢湧寳石者爲晋世之開先唐貞觀中源州松昌鴻池谷中忽湧五石青質白文者昭李氏之靈祚也先生曰參學之士親書誓詞投吾爲師吾爲奏聞都仙轉奏上天普告三界依法付度不須申奏文字醮謝不限定儀不得舉債泛費凈明忠孝全書卷之四
