front:
  text: 淨明忠孝全書序奉五世謂仙道者遺世絶物豈其然乎西山玉真劉先生繼旌陽仙翁淨明之道必本於忠孝匪忠無君匪孝無親八百之仙率是道矣噫非忠非孝人且不可爲況於仙乎維孝維忠仙猶可以爲況於人乎古人云欲脩仙道先脩人道舍是何以哉光禄大夫蔡國公知經筵事張珪序余嘗待罪集賢洪都黄冠師黄中黄袖一編書來請曰此吾師玉真子受都仙太史淨明忠孝之筌要也敢丐一言壽吾道脉異哉設教名義得無類吾儒明明德修天爵之謂歟夫臣職忠子職孝萬古良知有不可泯者五常根於人心也仁包四德而配春故行仁必本之孝焉四時行於天也土旺四季而配信故履信必主乎忠焉然則綱三綱常五常者其惟忠孝乎嗚呼堯舜之道孝弟而已矣夫子之道忠恕而已矣是知大道至德之要其在兹乎太史憤世高騖虚玄徒事清談未能力踐去大道愈闊也於是即秉彝之固有開簡易進脩之徑以化民範俗言近指遠厥惟休哉竊惟大哉乾也至哉坤也先儒特以誠敬釋之凡一意弗誠則非忠一念不敬則非孝學者能出忠入孝由存誠持敬爲入道之門服膺拳拳無斯須之不在焉一旦工夫至到人欲淨盡天理昭融虚靈瑩徹自得資深之妙于以合天地于以通神明莫知其然而然造夫大道之奧也又何難矣道家鍊神養性吾斯未臻歆艷導民忠孝有脗乎大中至正之道故爲之書榮禄大夫江南諸道行御史臺御史中丞趙世延序古昔帝王之設教未有不以明人倫爲事者自天屬而言必本於父子而兄弟長幼其分也自義合而言莫嚴於君臣而朋友夫婦其目也故舉其緫者每曰忠孝云治平之世君君臣臣父父子子人盡其分以脩其常職泯然無表異之名老子曰六親不和有孝子國家昏亂有忠臣者蓋生乎周末目覩乎倫隳法斁庶幾見一二於千萬焉其閔世憂俗之心殆與吾夫子不異哉然而道家之說旣專門於養生又旁出於祈禬而世人徒以爲邈然無意於斯世非要論也至治三年夏有方外之士謂予言豫章之境有古仙人曰許公旌陽其教人亦以忠孝爲說蓋其生在吴赤爲中至晋太康年百三十六歲而去世豈其觀於人事察乎世變而爲此論哉養生祈禬之家傳之且千歲而莫之察也又從西山道士黄中黄得玉真劉君與許公神交事甚異於是以許公忠孝之說本之儒家以謹其正推之道家以道其神其書之出又數年矣世亦莫悟其所以然也撫今懷昔盡然深有感於予衷者殆不可勝言也仙人道士之所爲豈偶然哉噫天理民彝歷千萬古無可泯滅之理一息不存人之類絶矣神仙之學豈有出於此之外者乎知乎此則長生乆視在此矣無爲之化在此矣善讀者尚以心會之泰定初元四月十日國子司業虞集拜手謹書神仙之說上古所傳軒轅鼎湖周穆瑶池皆是也後世立言著書超騰隱化時有其人惟都仙許君以忠孝自脩得仙道入以救世余嘗謂其功不在禹下不但獨善其身也龍沙應期仙真復出玉真之竒遇見於其書中黄之正傳蓋昔聞而今識之語録首篇謂世儒習聞是語此間却務真實一物不欺一體皆愛一念之欺即不忠一念之孝印於天此數則者民彝世教之大綱大領歟噫方外之士守其師之言而不畔傳之世世如金玉而藏諸正心脩身之學躬行踐履之間凛然如在左右吾黨之士當泚顙而深愧之矣中黄貌和而心正論直而行方易曰黄裳元吉文在中也又曰黄中通理正位居體中黄之義有取於此正其心脩其身者如是矣推而行之上以續都仙忠孝之傳下以達天下後世莫不爲忠臣孝子此君之師與君之教多矣則其師出於豫章信矣夫於戲盛哉文林郞江西等處儒學提舉前應奉翰林文字同知制誥兼國史院編脩塍賔題辭宇宙間形氣互相依附而其中運行不息者有理存焉故得氣之清而能明其理者兼善則爲聖神爲上智獨善則爲隱君子爲列仙得氣之濁而昧于理者反是雖其爲品萬有不齊而上知不常見也若吾洪都西山都仙許公是己公在晋嘗令旌陽邑人懷其政後得道來江西從學者多所成西江之人相傳其誅蜃等事至于今神而宗之不敢忘此誠非獨善而止者道家者流又有沖舉拔宅之說縉紳之士所不敢質然其以真忠至孝爲教則萬萬不可誣也其傳言許公受教於日月二君及諶姆蘭公傳忠孝之道比二十年前玉真劉先生隱西山復得是傳其徒黄君元吉彙所聞平時語爲書刻布之至治癸亥巽申宫太史繇黄君獲觀焉乃歎曰此書行世將人人知懲忿窒慾明理充其忠孝之實則聖賢閫域可躋而跂也豈徒曰列仙隱者之事乎夫玉真之心都仙之心也都仙之心天地之心也同志之士苟毋忽其書能深味切省則庶乎其有契焉應奉翰林文字將仕郞同知制詰兼國史院編脩廬陵曾巽申拜手謹題易坤卦文言曰君子黄中通理黄中央色也夫子於坤卦取中正爲本而能通達天下之道理上天下地之字往古來今之宙顧不可斯盡泯滅者此中正之理耳蠹蝕於春秋相戕相靡理幾晦矣夫子繫周易作文言發爲黄中通理之論正以救當時頽風敗俗律天下爲中正之歸夫子豈得已而作斯言耶使幸生堯舜之時歌呼爲擊壞之民又何必盡洩斯道之祕乎比年龍沙叶識建壇於鸞翔鶴峙之地都仙親降壇記又專發黄中之理授於玉真先生都仙之心夫子救世之心也蓋欲惟忠惟孝不乖不偏盡叶中正之理以躋聖世於隆平之盛中黄黄先生出示玉真先生語録亟覽之又首發正心誠意扶植綱常之語又曰大忠者一物不欺大孝者一體皆愛又曰萬法皆空一誠爲實斯言也是真能體認都仙之㫖以爲教矣抑豈特都仙之㫖正吾夫子之㫖也亦堯舜以來精一執中之㫖也最後又發明都仙道劎鐵柱之說皆足以破千古之惑雖然都仙玉真之互相發明亦豈得己而盡洩斯道之祕乎載覽之餘再拜稽首序而歸之將仕佐郞建昌路儒學教授彭埜序
