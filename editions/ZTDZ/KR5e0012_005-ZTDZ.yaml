front:
  text: 淨明忠孝全書卷之五奉八
  hash: sha256:87d350dc7c9fc27a87379d7cf6a5534d453e30ee4e5fe4dfb826ae7cfe8ee5a8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5e0012_SJB_005-240645a, image: sjb/24/240645a.png}
body:
  text: 凈明傳教法師黄元吉編集嗣派弟子徐慧校正玉真先生語錄别集或問太上未形口訣群仙未著丹經以前昆蟲草木皆知變化若墮言詮轉没交涉切聞教中有所謂淨明忠孝之書毋乃支于說而費于辭乎先生曰吾教中有大中至正之道千聖不傳之秘出於言語文字之外者子亦嘗得聞乎夫書之行也乃權法也非實法也實法者一而已矣何謂一太上之淨明夫子之忠恕瞿曇之大乗同此一也推而論之帝嚳之執中堯之允執厥中舜之精一禹之洪範湯之聖敬日躋文王之純亦不已伊尹之一德孟子之養氣子思之中庸皆此一也立言雖殊其道則一聖人知道之不可言而因言以顯道知道之不可傳而因心以契道其曰抱元守一窮理盡性明心見性爲未忘心法者言也唯吾淨明大教先聖後聖以神合真以心契道不墮言詮不落法塵其所以流演宻義以言爲倡者亦豈得己而爲之政欲使學者從博而約從修而證回後天而先天復有名而無名符淨明無爲一也到此時則聖人之權法亦猶經者徑之義也先生曰人心之動因物有遷當於物接之初返觀以遏其源所謂復也凡物之理動無不復雷轟風動興行萬變終歸於寂乃其本也先生曰無極者即太上所謂谷神言其體也太極者即玄牝蓋言其用也谷虚而善應神靈而無方以至靈之物藏至虚之所能如是矣則乾道變化各正性命此玄牝之所以爲天地根也先生曰大道生我於無置我於虚确然一靈根於太始故視而可見者色也而求其所以見色者不可得聽而可聞者聲也而求其所以聞聲者不可得夫人之耳目手足皆形之於有必藉其中無形者運之猶虚空無形以萬物之形爲形是也惟無也故能包萬有而無餘以成大道之體惟有也故能顯一無之妙用以成大道之功先生曰道寓於物混成無間此常道也道散於物辯物制名非常道也無極而太極太極而兩儀兩儀而五行自無而之有一本萬殊也五行一隂陽隂陽一太極太極本無極自有而之無萬殊一本也唯反身而誠復歸於一則萬物皆備於我矣先生曰淨明先天大道原於一炁一炁運行晝夜不息周流升降物資以始此形而上者天也大塊流形盤礴厚載洪織高下物資以生此形而下者地也道立其中黄法布於八極一正八治天清地寧此中立於兩間者人也天地萬化人民品物自生自化自存自亡昭然一理孰爲主宰向非淨明以忠孝立教扶植綱常則彝倫斁而生理息矣雖然志學之士大忠大孝根於天性安而行之不勉而中則我淨明之教無一字可傳迨乎時丁叔運世鼓澆風有爲者萬殊千致故太上推好生之德憫人生之不齊不得不彰其法耳都仙真君曰上士以文立忠孝以言爲天下倡所謂文所謂言乃縳律也使中人以下守此律以不失爲君子而中人以上自是以上達也果能如是又當以斯道參贊化育推以及人故有祈晴禱雨治病驅邪之法凡法中一符一印皆隂陽之靈文天地神明之信也體之則一字不立用之則萬法皆通凡我法子臻精真之極者當於未舉筆以先體究一念纔動便屬後天蓋天人相與靡間一息至誠所感如矢中的所謂至誠一念未動以先是也凡有投詞當屏除衆務澄湛一真則行事之時縱横妙用無所不通符印云乎哉所謂斂之方寸太極在躬施之萬事妙用無窮也先生曰都仙玉真教主先生於宋紹興辛亥間授經於何真公等有曰下士呼符水治藥餌己人之一疾救人之一病謂之功非功也道家方便法門耳吾之忠孝淨明者以之爲相舉天下之民躋於仁壽措四海而歸於大平使君上安而民自阜萬物莫不自然以之爲將舉三軍之衆而歸於不戰以屈人之兵則吾之兵常勝之兵也以吾之忠教不忠之人盡變爲忠以吾之孝教不孝之人盡變爲孝其功可勝計哉又曰上士非必入山絶人事去妻子入閒曠捨榮華而謂之服鍊當服鍊其心性心明性達孝悌不虧與山澤之癯童者異矣忠孝之道非必長生而長生之性存死而不昧列於仙班謂之長生有曰養炁延年者特未得其一二耳君子之致乎道者八八寳是也比干死諫謂之忠大舜終身謂之孝善卷殺身謂之廉南容復圭謂之愼榮期安貧謂之寬顔回簞瓢謂之裕叔度洪量謂之容公藝恕己謂之忍如是之人位列仙班後世失道之人不忠不孝以亂其國家國家敗無所容身乃假名入山學道是捨厦屋而入炎火也子不見乎民之不忠天生聚斂之臣子之不孝婦産敗家之孫又有曰上士以文立忠孝以言爲天下倡中士以志立忠孝以行爲天下先下士以力致忠孝以身爲衆人率如此則淨明院注籍昇仙而忠孝之道終矣先生曰塊桴土鼓汙尊壞飲禮樂存焉故有無聲之樂無體之禮樂之鐘磬金聲而玉振之也修齋設醮必擊磬以格天神鳴鐘以召地祇始終調理貴在和澹和而躁心釋淡而欲念平如是則心正意誠合乎無爲故與天地一今人未明此理叩擊音聲務求宏厲慆堙心耳令人欲動情勝宜其天人間隔矣又化財設供不過表誠貧士志誠酌水亦可所謂東鄰殺牛不如西鄰之禴祭故曰大音希聲大禮必簡先生曰科法中建齋行道只是積誠以期醮祭之時天人響答每見朝醮行事太煩及至祭享則齋主法衆誠意已怠修齋之士可不審之先生曰道不可名所可名者物而已矣道不可傳所可傳者教而已矣雖然道在天下未嘗無名未嘗無傳道之有名如殘朴以爲器凡器之中有形而上者存焉道之有傳如大鈞元氣行於四時萬物各遂其生凡物之生有執其機者焉吾淨明大教推本太上究其言詮則精一執中之㫖正一斬邪三五飛步先天五雷一暘鍊度皆可名可傳之大者也求道之方雖不在是亦不外是先生曰今人無德有道未戒先齋可謂抱薪救火先生曰性猶日也身猶月也星家以人所生之時推日出之時爲立命即我之性也以月之所在爲安身即我之身也身命禀炁自相依附何也日之所寓爲月性之所寓爲身人性之靈明知覺非父母之靈乃自性之靈也其未生以前精爽遊揚太空去來無碍纔出母胎則此性欻然感附而身命不相離者亦猶月之生魄必先與日相會謂之合璧此欻然感附之時也月本無光附日以明日之光明即我性之靈明也以日之遠近爲月之盈虧月之盈虧即我之生死生生曰天命流行化育萬物無非道也日月星辰昭布森列無非經也雷轟霆擊霜清雪明無非法也細而幽林鳥噪碧澗魚跳雲片翕張瀑聲嗚咽如是景象無非示人入處故復卦以動之端爲見天地之心處先生曰上古之時隂陽和暢風雨順調民物阜康鬼神不擾皆是太和之氣感召亦大人過化存神之效也先生曰忠孝者臣子之良知良能人人具此天理非分外事也若以爲有德於君父而鈎名邀譽是亦華士元少正卯之流耳先生曰處臣子最難之地而能通乎權變以成天下之大經立天下之大本大舜比干是也故申生之待烹以成其恭非不孝者而獨稱舜不陷父於不慈也微子之去殷以存宗祀非不忠者而獨稱比干能全臣之大節也臣子之忠孝而身不免乎戮有幸與不幸也大舜申生微子比干易地則皆然先生曰物理之相感有不疾而速不行而至者燧諸水火穹壤匪遥磁石引鍼隔碍潜通知法家之符印爲燧諸而一己之靈爲真水火則可與語道法矣非惟物理爲然人亦有之其母齧指其子心動此氣類之相感也或問儒家是有爲之學道家是無爲之學儒家之用是範圍天地之内道家之用是超越天地之外此說可得聞與曰子未知有爲之學又安能知無爲之學哉或問淨明大教始於忠孝立本中於去欲正心終於真至淨明然息心甚難況日月之間天理人心互爲雄長爲之奈何曰前念爲念後念爲照念起不著淨心守一但滅動心不滅照心但凝空心不凝住心湛然常寂是名空心止動歸止是名照心寂照兩全洞合道源淨極明生玄之又玄先生曰寂然不動是無極感而遂通是太極無極者淨明之謂三界上者也然天黄大陽即天界之無極吴天上帝爲太極地黄太隂即地界之無極后土氏爲太極人黄丹扃即人界之無極盤古王爲太極又萬物之中各具太極非知道之深不可語此先生曰喜怒哀樂不失於正於道無傷但須發之各有攸當不致乖戾耳先生曰雷祖者神霄九宸之无極也九宸者雷霆之九炁九司者九宸之餘炁耳先生曰今奉新縣浮雲山華林八百洞政爲龍沙八百弟子而設即八百群真之緫會洞也洞主乃太上老君今稱李真人又稱李八百又云日行八百里壽至八百歲其說皆非自天地開闢以來即有此洞以待後之列仙也先生曰世傳石函記金鎖記及醉思仙歌等類皆非真君所作真君之文無非發明忠孝之道學者審之先生曰弟子授受之後當秉孝誠具列上世亡名投師超度或自行鍊法是亦報本也詳見一暘鍊度法中先生曰吾淨明大教示人以簡易之理而人猶難之甚矣道之不明也學道之士當篤信心萬一懷疑便有窒碍己且昏惑何以明人夫天與之而不能守守之而不能行是棄天也自卑以求幸其言自鬻以求售其學是褻天也棄天褻天是謂背道凡我法子戒之愼之凈明忠孝全書卷之五
