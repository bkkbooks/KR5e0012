front:
  text: 淨明忠孝全書卷之六奉九
  hash: sha256:17275ab8e1678b77296a7a34fe74e80e4cd36a760bddd827077199ff21033cd4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5e0012_SJB_006-240648b, image: sjb/24/240648b.png}
body:
  text: 凈明法子玉隆陳天和編集廬陵徐慧校正中黄先生問答或問奉道之士居處端莊齋戒沐浴以崇香火可得謂之凈乎答愚聞之師曰凈不染物如上所問是謂外貌之凈然就裏必索要凈方謂之内外交養大概無别說只要除去欲念便是凈就裏除去邪惡之念外面便無不好的行檢前輩云通身要得無枝葉先向根頭下一刀其次要懲忿據愚見觀之忿亦只是欲以其有意必固我非欲而何淘汏到無的田地却是公心也公能生明所以曰欲凈則理明但靜觀人被一私纏繞的則胷次之理頓昏矣尚且對人爭辨曰我是公心殊不知衆心以爲不公矣只我自己道是公心怎濟得事夫心如何肯印可又有人雖自信是公心行事往往發揚有過當處言語有不節省處俗語謂之無良公道名稱便不中聽了以其縱不貪利亦是貪名又有是假公行私的皆不合聖賢之道不合天心用得多了積得乆了後地却有不美的招感上身來何如遇事觸物時平心定氣說出公道話來則人心自然畏服不肯爲非矣但涉忒做作處便是不美若能方便以理化導是省多少氣亦且上合天心無欲故淨於此尤可信學到此時方得謂之能淨又問遇事接物必洞燭善惡邪正是非曲直可得謂之明乎答愚聞之師曰明不觸物此言極有味如前所問明矣未極明也若爲己之學洞燭此理但行善的正的是的直的道子固是不差池了若侍他人之道洞燭其惡的邪的非的曲的不隨他轉爲是此外不宜發明太盡惡訐爲直是也但當生大慈憐憫的心方便譬喻引之歸於正道不可則止毋自辱焉若忿嫉于頑極口攻之則是與之脩怨矣何取其爲明哉先覺有言曰聦明深察而近於死者好譏議人者也慱辯大言而危其身者好發人之惡者也豈是明哲保身之道似此固能洞燭眼前而未能洞燭未來也故曰聦明睿智守之以愚學到此時方得謂之能明又問生平未嘗仕宦無致君澤民之事雖有忠心將何所施答曰是何言歟如此則人人必仕宦而後用心於忠乎師曰人之心君爲萬神之主宰一念欺心即不忠也大概仕宦之人固當以致君澤民行事不仕宦者亦合念念在於不欺心不昩理緊要處先自不妄語始能如前哲所言方免爲不忠之人爲學至此方謂之能忠又問事親之禮冬温夏清昏定晨省口體之養無不盡心可得謂之孝乎答曰此是孝道中一事耳當知有就裏的孝道不可不行持大概吾身是父母遺體但向行住坐卧十二時中善自崇護不獲罪於五藏方可謂之至孝有一種人心不尋思公忠正直仁孝廉明的所爲每朝每日念念憂奸邪刁譎澆薄險惡千鬼萬怪惟務坑陷虧負他人這是獲罪於心藏蓋是邪穢奸狡之念自涴靈臺多矣若能醒覺急忙盪滌與之更始可也又有立心雖稍良善卻不肯講究衛生之道飲酒無算廣殺物命滋味求竒不知節約遂致病生這是獲罪於脾藏又有色欲偏重亡精滅神至於殞軀這是獲罪於腎藏又有立心雖然公正情欲亦自澹泊然而嗔念獨重動不動是使血氣多不中節甚至一朝之忿忘其身教藏有云嗔怒無節令人心惛目亂醫書云盛怒傷肝謂肺主氣使肺金尅肝木令肝不攝血疾病生焉這是獲罪於肝肺二藏大概恣忿縱欲昩理三者於五藏皆有所傷而於本藏爲尤甚凡獲罪於五藏的人皆是破裂元氣作撻身己不行孝道的所爲靜思父母全而生之子全而歸之言語有忝多矣所以曰不得罪於五藏是名能孝此外却要理會得牧放心存夜氣方謂之反身而誠樂莫大焉即是窮取生身受氣初的工夫脩學至此時却是最上品的孝道然不能養親不能正心不能惜身但對人言我能窮取生身受氣初便是孝道了是謂不修人道而脩仙道後地成就未可必而先獲罪於所天矣當知九霄之上豈有不淨不明不忠不孝的神仙也無如上能凈能明能忠能孝四事學者努力進脩得到這地步又當知向上有真淨真明真忠真孝不可不知不可不行若能深明性地不染一塵動靜俱定應酬無傷是名真凈澄湛心源冰壼水月映徹萬象寤寐恒一是名真明不黍稷犧牲惟不欺爲用小心翼翼昭祀上帝是謂真忠珍嗇元氣深知天命長養道胎繼續正脉是謂真孝如上行持無忝庶幾踐形惟肖方謂之真人敢問真人之義云何答曰真者一真無僞人者異於禽獸凈明教中所謂真人者非謂吐納按摩休糧辟穀而成真也只是懲忿窒欲改過遷善明理復性配天地而爲三極無愧人道謂之真人問曰踐形惟肖此不過儒家之說是脩人道之工夫至於脩仙道之要是同是異答曰吾當爲詳言之大凡人生天地間恰如印下一箇模子相似又如蓮房有子中含藕根荷葉具體而微今夫人頭圓象天天一也乾陽之數竒人皆一首足方象地地二也坤隂之數偶人皆雙足須彌山爲天地骨人有脊梁骨象之泥九居頂象大羅天宫兩眼象日月三焦象三界五藏象五嶽大小腸象江河心有七竅象七星中天北斗七星是二氣五行之緫會賦予人身爲健順五常之性臍居下表風輪水淵之境小水出乎前表水歸東南海大腑居其後表酆都牢門向北按經云酆都在下方癸地處穢濁腥黑海中所以人間獄門皆作圜扉古人制獄者蓋有所祖又曰酆都之山日月光所不照人兩眼亦不及見其後人身如此可謂禀質隂陽肖貌天地者矣可不自重乎姑以形軀言之人當靜坐時正其衣冠不動聲色首體端直坐如矴石則一身鎭靜肖象乾坤是有多少尊貴處若輕浮躁動偃仆欹側動股摇身坐不安席是有多少寒賤處是豈有志踐形惟肖者哉形軀旣能嚴整行正坐正睡卧亦端然又當思惟一身之中有無極之真二五之精妙合而凝實不離乎中黄丹扃也能默悟此道而篤行之即是能充其形矣凡能如此爲人者云爲中不昩本性議論中皆有元氣問如何是不昧本性一舉一動作有義事如何是皆有元氣口不忘大中至正之理問亦有人不理前語者如何法子讀書明理聞見此語而不自重自愛者可謂不紹家業又謂之自外造化却怎弄人康節云還知虚過死萬遍恰似不曾生一般然造化實未嘗相外何以故但看順理而行者自有無量福德背理而行者自有無盡憂苦由是觀之立身穹壤間父乾母坤豈可不思踐形克肖也哉或問曰孟子有云不孝有三無後爲大窒欲之義願聞何如答曰道書云人生十六歲爲春十六歲爲夏十六歲爲秋十六歳爲冬通成六十四歲以配六十四卦當春夏之年體春元夏亨之義元者始也元氣渾淪宜善保護亨者通也元氣宣通以淑其後此蓋花開葉發比人朱顔青鬢時也然雖如此切忌過分庶幾免病矣所以前賢有云少而寡慾顔常好孝不求名語亦真此兩句甚有味又要理會得宜爾室家者是名正欲此外有犯是名邪淫又名非道行淫儒家謂之踰禮越禁冒犯憲章仙佛書中謂之極重惡業墮落輪迴正慾者只是嗣續人道繼承胄系作有義事若犯邪淫則是作無義事認苦爲樂或疾病或夭折皆是不重遺體於孝道有虧且使神識日墮幽隂穢濁之境而不自覺良可哀憫前輩曰作有義事是明悟心作無義事是狂亂心明悟不惛者得人道之正狂亂不改者殆非人類矣若珍護元氣至秋時宜漸收斂傳曰秋者揫也揫斂之象草木黄落比如人身鬚髮漸白草木當此乃歸根復命之時元氣歸宿于根本所以逢春生意勃然至十六歲冬時尤宜深藏秘固如霜降水涸河冰地凍故謂之秋收冬藏何以人而不如物乎大概古先聖賢體天法道與四時合其序於宇宙間俯仰無愧今之學者自當依而行之去道不遠更有年華雖老自漏不止元氣不復歸根遂至自已神識隨流傾墮寒庭幽境㝠㝠長夜未見其有生意良可惜也問亦有人當夏秋之時嗣續未立則如之何曰固有不獲已於秋冬之時方有嗣息然亦貴自撙節念念以景迫桑榆爲懼免致放肆而無忌憚問四時後猶餘年歲屬之春乎冬乎曰道書云卦數已滿精神有限惟安穀氣而生但名者壽六十五後至于瞑目之際無非窮冬臘盡之時若此生中恣忿縱欲曲昩道理則精神魂魄意五者皆歸于隂受諸苦報未能托胎更生人間譬如無根之草木雖以臘盡春回而斬無生意若此生中忿懲欲窒天理不昩則精神魂魄意五者俱在陽光之中生意盎然身謝之後隨其福業或生天上或生人間恰如臘盡而春即回也或問曰今有學者乆别父母求仕於千里之外自以立身揚名顯親藉口果可謂之孝乎答曰唐陽城爲國子司業一旦引諸生告之曰學者所以學爲忠孝也諸生有乆不省親者乎明日還養者二十輩有三年不歸侍者斥之觀前輩此等教法誠可爲準的由是觀之但知仕宦不顧父母之養者爲得謂之孝道或問如何謂之三界保舉答曰學者常以忠孝二字貼在額頭上要念不妄動身不妄爲言不妄發律已須索嚴正待人却合寬厚所謂和而不同和而不流積日乆乆間則上品中品下品的人便自然心悅誠服語言之間不待思惟說出來便相信了詰其根源只是就誠字上做出世人三等旣相信天地鬼神亦相與矣何患不成仙也因告之曰學道之士若行得三十分工夫時天心方印可行法則法有靈驗辦道則道有成就第一要踐履十分端正第二要守道十分靜工第三要臨事十分誠敬無有不應若無此三者縱是參到天涯海角見了無數宗師只恐虚老歳月又曰胷中不可無明鏡一面以其能洞照事理云爲不昩又不可無利劎一張以其見事能斷制無復狐疑猶豫之情又不可無官稱一枝以其知輕識重不差分毫具此三物方可保其學至聖賢神仙地位也或問淨明之道尚神竒變化否答曰大道無名無形無情所以曰平常心是道又曰萬般祥瑞不如無平常安穩却合道學者但當行持能凈能明能忠能孝乆乆至於真凈真明真忠真孝感格霄穹自有成就成變化行鬼神雖舉意皆如然而終不失正念其道莫大焉世俗所謂神怪之事實非所尚也或問罪福因果之事有之乎答曰未須廣引仙經佛教但以儒書言之作善降之百祥作不善降之百殃積善之家必有餘慶積不善之家必有餘殃言悖而出者亦悖而入貨悖而入者亦悖而出戒之戒之出乎爾者反乎爾者也即此便是罪福因果所以先儒有云天地間只是一箇此感彼應又曰逼塞虚空無非此理如此則感應之道昭昭矣大凡人作善者譬如下五穀種子分明是春種秋收作惡者譬如彎弓入陣决定有報箭來但上品之士决不肯犯中根之人喫拳後方省記打拳時愚暗者全然不省問亦有作善作惡無報者乎曰果熟然後蒂落未熟時勿訝其不落也前賢詩云冬去冰須泮春來草自生請公觀此理天道甚分明或問許吴十二真君向來修仙道皆是出家高士否答曰謹按仙傳云都仙許真君少時剋意爲學博通經史不求聞達鄉黨化其孝友交游服其德義郡舉孝廉不就晋朝屢加禮命乃以太康元年起爲蜀郡旌陽縣令吴君仕吴爲西安縣令今分寧是也天性至孝陳君周君皆世族儒生甘君乃草澤布衣施君初爲鄉壯士弓劎絶倫彭君舉孝廉仕晋累遷尚書左丞旴君鍾離君皆都仙姊氏之子黄君實都仙之婿任青州從事如上皆坐家脩行之士也此外惟有曾君時君從少爲黄冠上士然皆慕孝道之教而成真焉由是觀之道由心悟玄由宻證得其傳者初不拘在家出家但有志節無不成就何況日月二君元傳凈明忠孝之道不必廢人倫外名教絶俗離群而吾師玉真先生遇都仙亦以在俗之身焉學者無間道俗勉之勉之或問都仙真君旣是太陽上帝化生而於晋朝仕不顯融止舉孝廉除縣令何哉答曰大凡得道至人皆神靈變化隱顯莫測不以官職崇卑爲拘也所以葛稚川神仙傳云老子乃天之精魂無世不出如上三皇時爲玄中法師黄帝時爲廣成子周文王時爲守藏史武王時遷柱下史之類又如梓潼帝君生周宣王時爲大夫張仲孝友是也又如玄天上帝出現宋朝爲狄招討馬前曾現示龜蛇之形則化身爲將軍矣又如純陽真君生唐時不過一進士道成之後自稱前生乃九天御史蓋諸聖賢往往皆如藏教中所云道果已成迴入塵勞退位度生豈凡夫所能測度哉或問玉真語録所載鐵柱之事云是地之精華涌出何以今古相傳圖畫明明作役使鬼神用工下手之狀亦必有所據答曰世間此等事說來煞有曲折但須探造道妙智周萬物無所不通者可與語此按藏教中有云譬如一種飲食現前天人鬼畜四類所見自是不同謂各隨其福業故耳天神見是酥酡妙饌世人見是平日飲食餓鬼享之爲吞火食炭禽獸食之則止充饑而無味所以一切山林屋舍舟船車轝等彼四類見之種種各别又云恒河中水人見則分明是波浪業重之鬼見之顚倒以爲煙焰矣又舊記雷書有三種鬼囚皆是凡夫所犯殁後料揀罪狀當入此數一是輓運雨澤謂運水逆升虚空助龍行雨二者摙汲溟波俗謂之推潮鬼三者伐薪煑泉諸處湯泉是也以人觀之則云雨自天降潮是海涌湯泉是土地所出那有許多事而㝠㝠中所見如此今夫鐵柱當湧出地時都仙宴息真淨妙明境中不過微作念耳蓋成道護生時節因縁應如是也此即關尹子所謂道無鬼神獨往獨來的境界今此教中謂之深造真凈妙明之心學若凡夫肉眼當時自見有許多鬼工現前鈴槌鑪鞲靡所不有若業龍蛟蜃之類則當時自見有鐵柱鐵鎻制伏拘束彌宻牢固畏懼退縮略不敢動作矣無他只是有道之士心境虚明微妙所見自然輕清無許多繁擾粗重縱有所作皆神動天隨不過性海中一浮漚發耳若凡夫蛟蜃輩業力濃厚所見自然粗重惡濁便有許多境界現前所以上聖高真往往指此輩爲妄見妄聽之徒如此則人間相傳安得而不爲圖畫哉凈明忠孝全書卷之六
