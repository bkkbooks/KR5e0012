body:
  text: 癸亥夏五月余與盛兄熙明同拜中黃先生于京師澄清坊之東時高朋滿座先生顧余曰夜夢子今子來似有夙契遂授淨明忠孝書并玉真語録余讀未終集平生諸疑渙若冰釋越數日先生復問曰前讀語録何如余應曰萬法皆空一誠為實盡矣先生首肯之良久復謂曰子資質頗近道當宏吾教勉旃勉旃復出語録數段云此尚未刊異時當併刻之余以泰定甲子春南歸而先生以乙丑臘解化於京師矣丙寅之秋余詣玉隆謁仙塋會先生高弟雲隱陳兄于清逸堂出示所藏先生遺墨并所集先生平昔答問諸善言皆余嘗聞諸先生者雖先生之言實皆祖述玉真之傳也已而復於隱真壇得蒼崖熊先生所藏玉真語録數段即向來先生示余者因録于别集并以元所傳靈寶壇記道説法説忠孝諸書皆鋟梓而流傳之總名曰淨明忠孝全書同志之士讀之者當守律勿失敬之如神明畏之如雷霆奉而行之回後天而先天復有名而無名殆猶日月晦而明天地夜而旦四時冬而春則豈但騎鶴玉府烹鳳瑶池獨善其身而已矣又將見忠孝之化周流八荒綱常正而天理明雨陽若而民不疵癘上以極聖君賢相雍熙和平之治下以使昆蟲草木同躋仁壽之域寧不偉與寧不盛與泰定四年歲在丁卯十二月乙未朔淨明靈寶忠孝弟子丹扃道人廬陵徐慧子竒焚香再拜謹書
